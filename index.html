*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
:root{
  --pr:#0a2b4e; --pr2:#1e4a76; --prg:rgba(10,43,78,.3);
  --gd:#d4af37; --gdl:#f0d060; --gdg:rgba(212,175,55,.4);
  --gl:rgba(255,255,255,.97); --bg:#eef1f7;
  --cs:0 8px 32px rgba(10,43,78,.10); --hs:0 20px 50px rgba(10,43,78,.18);
  --tr:all .3s cubic-bezier(.4,0,.2,1); --r:20px; --rs:12px;
}
body{background:var(--bg);color:#1e2a3e;min-height:100vh;background-image:radial-gradient(circle at 20% 50%,rgba(10,43,78,.04),transparent 50%),radial-gradient(circle at 80% 20%,rgba(212,175,55,.05),transparent 50%);}

.dark .gc,.dark .fc,.dark .post-card,.dark .nc,.dark .qc,.dark .hsc,.dark .asc{background:rgba(16,22,36,.96)!important;border-color:rgba(255,255,255,.07)!important;color:#ccd6f0;}
.dark .form-control,.dark .form-select{background:#141c2c!important;border-color:#2a3550!important;color:#dde!important}
.dark .text-muted{color:#7a8aaa!important}
.dark footer{background:#060912!important}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--gd);border-radius:10px}

/* Loader */
#ldr{position:fixed;inset:0;z-index:9999;background:var(--pr);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s;gap:15px}
#ldr.hide{opacity:0;visibility:hidden;pointer-events:none}
.ll{width:80px;height:80px;border-radius:50%;border:3px solid var(--gd);background:white;padding:6px;animation:plg 1.2s infinite;object-fit:cover}
@keyframes plg{0%,100%{transform:scale(1);box-shadow:0 0 0 0 var(--gdg)}50%{transform:scale(1.05);box-shadow:0 0 0 15px transparent}}
.ld span{width:8px;height:8px;border-radius:50%;background:var(--gd);display:inline-block;margin:0 3px;animation:bd 1.2s infinite}
.ld span:nth-child(2){animation-delay:.2s}.ld span:nth-child(3){animation-delay:.4s}
@keyframes bd{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-12px)}}

/* Header */
header{background:linear-gradient(135deg,var(--pr),#0e3a65);border-bottom:4px solid var(--gd);padding:12px 0;position:sticky;top:0;z-index:100;box-shadow:0 6px 20px rgba(0,0,0,.3)}
.slogo{width:70px;height:70px;border-radius:50%;border:3px solid var(--gd);background:white;padding:4px;transition:var(--tr);cursor:pointer}
.stl{font-weight:900;color:white;text-shadow:0 2px 5px rgba(0,0,0,.4)}
.hbg{background:var(--gd);color:var(--pr);font-weight:800;padding:3px 12px;border-radius:30px;display:inline-block;font-size:.7rem}
.od{width:8px;height:8px;border-radius:50%;background:#2ecc71;display:inline-block;animation:od 2s infinite;margin-left:5px}
@keyframes od{0%,100%{opacity:1}50%{opacity:.3}}

/* Ticker */
.tk{background:linear-gradient(90deg,var(--pr),#0e3a65);color:white;padding:8px 0;border-bottom:2px solid var(--gd);white-space:nowrap;overflow:hidden;position:relative}
.tw{display:inline-block;animation:ts 40s linear infinite}
@keyframes ts{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ti{display:inline-block;padding:0 25px}
.ti i{color:var(--gdl);margin-left:6px}

/* Cards & Layout */
.gc{background:var(--gl);backdrop-filter:blur(12px);border-radius:var(--r);padding:20px;box-shadow:var(--cs);border:1px solid rgba(255,255,255,.4);transition:var(--tr)}
.gc:hover{box-shadow:var(--hs)}
.smi{background:#fff;border:none;border-radius:var(--rs);padding:12px;margin-bottom:10px;width:100%;text-align:right;font-weight:700;transition:var(--tr);cursor:pointer;border-right:4px solid var(--gd);display:flex;align-items:center;gap:10px;color:var(--pr);box-shadow:0 2px 6px rgba(0,0,0,.05)}

.smi i{width:25px}
.mb2{margin-right:auto;background:var(--gd);color:var(--pr);padding:2px 8px;border-radius:30px;font-size:.65rem;font-weight:800}
.sw-wrap{border-radius:var(--r);overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.2);border:3px solid white;margin-bottom:20px}
.hs{height:250px}

.sc2{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.7));color:white;padding:15px;font-weight:700}

.sc{display:flex;justify-content:space-between;padding:10px;background:#f4f7ff;border-radius:var(--rs);margin-bottom:8px}

.fc{background:white;border-radius:var(--rs);overflow:hidden;box-shadow:var(--cs);transition:var(--tr);height:100%;display:flex;flex-direction:column}

.fc-body{padding:14px;flex:1;display:flex;flex-direction:column}

.fc-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.fc-btn-primary{background:var(--pr);color:white;border:none;border-radius:30px;padding:6px 12px;font-size:.75rem;font-weight:700;cursor:pointer;transition:var(--tr);flex:1;text-align:center}

.fc-viewer{background:#000;width:100%;margin-top:12px;border-radius:12px;overflow:hidden}

.up{height:6px;background:#e0e4ec;border-radius:5px;display:none;margin-top:10px}

.fb{border:1px solid #ddd;border-radius:30px;padding:4px 12px;background:white;font-size:.75rem;font-weight:700;cursor:pointer}
.fb.active{background:var(--pr);color:var(--gd);border-color:var(--pr)}
.tc{position:fixed;top:80px;left:20px;z-index:1000;display:flex;flex-direction:column;gap:8px}
.ti2{background:var(--pr);color:white;padding:10px 18px;border-radius:12px;font-size:.8rem;font-weight:600;box-shadow:0 4px 15px rgba(0,0,0,.2);border-right:4px solid var(--gd);animation:tin .3s ease}

.fab-th,.fab-st{position:fixed;bottom:25px;left:25px;width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;z-index:500;box-shadow:0 4px 12px rgba(0,0,0,.2);transition:var(--tr)}

.mn{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--pr);z-index:200;padding:5px 0;border-top:2px solid var(--gd)}
.mni{flex:1;display:flex;flex-direction:column;align-items:center;color:rgba(255,255,255,.7);background:none;border:none;font-size:.6rem;font-weight:700}
.mni i{font-size:1.1rem;margin-bottom:2px}
.mni.active{color:var(--gd)}
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;opacity:0;pointer-events:none;transition:.3s}

.drawer{position:fixed;top:0;right:-270px;width:270px;height:100%;background:var(--pr);z-index:401;transition:right .3s;padding:20px;overflow-y:auto}
.drawer.open{right:0}

/* Posts Styles */
.post-card{background:white;border-radius:var(--r);padding:20px;margin-bottom:20px;box-shadow:var(--cs);transition:var(--tr)}
.post-card:hover{box-shadow:var(--hs);transform:translateY(-2px)}
.post-header{display:flex;align-items:center;gap:12px;margin-bottom:15px}
.post-avatar{width:45px;height:45px;border-radius:50%;background:linear-gradient(135deg,var(--pr),var(--pr2));display:flex;align-items:center;justify-content:center;color:var(--gd);font-size:1.2rem}
.post-author{font-weight:800;color:var(--pr)}
.post-date{font-size:.7rem;color:#999}
.post-content{line-height:1.6;margin-bottom:12px}
.post-media{margin:12px 0;border-radius:12px;overflow:hidden}
.post-media img,.post-media video{width:100%;max-height:350px;object-fit:cover}
.youtube-embed{position:relative;padding-bottom:56.25%;height:0}
.youtube-embed iframe{position:absolute;top:0;left:0;width:100%;height:100%}
.post-actions{display:flex;gap:20px;padding-top:12px;border-top:1px solid #eee}
.post-action-btn{background:none;border:none;cursor:pointer;font-size:.8rem;color:#666;display:flex;align-items:center;gap:6px;transition:var(--tr)}
.post-action-btn:hover{color:var(--pr)}
.post-action-btn.liked{color:#e74c3c}
.post-comments{padding-top:12px;margin-top:12px;border-top:1px solid #eee}
.post-comment{background:#f8f9fa;border-radius:10px;padding:8px 12px;margin-bottom:8px;font-size:.8rem}
.stat-edit{cursor:pointer;transition:.2s}
.stat-edit:hover{opacity:.7;transform:scale(1.05)}
.json-upload-area{border:2px dashed var(--gd);border-radius:var(--r);padding:30px;text-align:center;cursor:pointer;background:#f9fbfe}
.json-upload-area:hover{background:#fef9e6}
.results-manager{background:linear-gradient(135deg,#f8f9ff,#fff);border-radius:var(--r);padding:20px;margin-bottom:20px}

@media(max-width:768px){
  .mn{display:flex}

  .gc{padding:14px}
}
</style>

const esc = t => { const d=document.createElement('div'); d.appendChild(document.createTextNode(t||'')); return d.innerHTML; };
const toast = (msg, type='i', dur=3000) => {
  const c=document.getElementById('TC'); if(!c) return;
  const t=document.createElement('div'); t.className=`ti2 ${type}`;
  t.innerHTML=`<i class="fas ${type==='s'?'fa-check-circle':type==='e'?'fa-times-circle':'fa-info-circle'}"></i><span>${msg}</span>`;
  c.appendChild(t); setTimeout(()=>{t.style.animation='tout .3s forwards'; setTimeout(()=>t.remove(),300);},dur);
};
const isImg = u => /\.(jpg|jpeg|png|gif|webp|svg)(\?|$)/i.test(u||'');
const isVid = u => /\.(mp4|mov|avi|mkv|webm)(\?|$)/i.test(u||'');
const isPdf = u => /\.pdf(\?|$)/i.test(u||'');
const isYouTube = u => u && (u.includes('youtube.com/watch') || u.includes('youtu.be/'));
const isVimeo = u => u && u.includes('vimeo.com/');
const getYouTubeId = url => { const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?#]+)/); return match ? match[1] : null; };
const getVimeoId = url => { const match = url.match(/vimeo\.com\/(?:video\/)?(\d+)/); return match ? match[1] : null; };

// Stats Management
function loadStats(){
  db.ref('school_stats').once('value', snap => { if(snap.exists()) statsData = snap.val();
    document.getElementById('CS').innerText = statsData.studentsCount;
    document.getElementById('CT').innerText = statsData.teachersCount;
    document.getElementById('CA').innerText = statsData.activitiesCount;
  });
}
function editStat(stat){
  if(!isAdmin){ toast('متاح للإدارة فقط','w'); return; }
  Swal.fire({title:'تعديل الإحصائية',input:'number',inputValue:statsData[stat],showCancelButton:true,confirmButtonText:'حفظ'}).then(res=>{
    if(res.isConfirmed && res.value){
      statsData[stat] = parseInt(res.value);
      db.ref('school_stats').set(statsData);
      document.getElementById(stat==='studentsCount'?'CS':stat==='teachersCount'?'CT':'CA').innerText = statsData[stat];
      toast('تم التحديث','s');
    }
  });
}

// Posts System
function showPosts(){
  hideHero();
  document.getElementById('MC').innerHTML = `<div class="fi"><div class="d-flex justify-content-between align-items-center mb-3"><h4 class="fw-bold mb-0"><i class="fas fa-newspaper"></i> المنشورات</h4>${isAdmin ? '<button class="btn bg btn-sm" onclick="showCreatePost()"><i class="fas fa-plus"></i> جديد</button>' : ''}</div><div id="postsList"></div></div>`;
  loadPosts();
}
function loadPosts(){
  const container = document.getElementById('postsList');
  if(!container) return;
  container.innerHTML = '<div class="text-center p-5"><div class="spinner-border text-primary"></div></div>';
  db.ref('posts').orderByChild('timestamp').once('value', snap => {
    let posts = [];
    if(snap.exists()) snap.forEach(c => posts.push({ id:c.key, ...c.val() }));
    posts.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
    if(!posts.length){ container.innerHTML = '<div class="text-center p-5"><div class="esi">📝</div><p>لا توجد منشورات</p></div>'; return; }
    container.innerHTML = posts.map(p => renderPostCard(p)).join('');
    posts.forEach(p => { document.getElementById(`likeBtn-${p.id}`)?.addEventListener('click', ()=>likePost(p.id)); });
    document.getElementById('postCount') && (document.getElementById('postCount').innerText = posts.length);
  });
}
function renderPostCard(p){
  let mediaHtml = '';
  if(p.mediaUrl){
    if(isImg(p.mediaUrl)) mediaHtml = `<div class="post-media"><img src="${p.mediaUrl}" loading="lazy"></div>`;
    else if(isVid(p.mediaUrl)) mediaHtml = `<div class="post-media"><video controls src="${p.mediaUrl}"></video></div>`;
    else if(isYouTube(p.mediaUrl)){ const id = getYouTubeId(p.mediaUrl); if(id) mediaHtml = `<div class="youtube-embed"><iframe src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe></div>`; }
    else if(isVimeo(p.mediaUrl)){ const id = getVimeoId(p.mediaUrl); if(id) mediaHtml = `<div class="youtube-embed"><iframe src="https://player.vimeo.com/video/${id}" frameborder="0" allowfullscreen></iframe></div>`; }
  }
  const visitorId = sessionStorage.getItem('visitorId') || 'guest';
  const isLiked = p.likes && p.likes[visitorId];
  const likesCount = p.likes ? Object.keys(p.likes).length : 0;
  const commentsCount = p.comments ? p.comments.length : 0;
  const commentsHtml = (p.comments || []).map(c => `<div class="post-comment"><strong>${esc(c.name)}</strong><p class="mb-0 small">${esc(c.text)}</p><small class="text-muted">${c.date||''}</small></div>`).join('');
  return `<div class="post-card" data-aos="fade-up"><div class="post-header"><div class="post-avatar"><i class="fas fa-user"></i></div><div><div class="post-author">${esc(p.author||'إدارة المدرسة')}</div><div class="post-date">${p.date||new Date(p.timestamp).toLocaleDateString('ar-EG')}</div></div></div><div class="post-content">${esc(p.content)}</div>${mediaHtml}<div class="post-actions"><button class="post-action-btn ${isLiked ? 'liked' : ''}" id="likeBtn-${p.id}"><i class="fas fa-thumbs-up"></i> <span>${likesCount}</span></button><button class="post-action-btn" onclick="toggleComments('${p.id}')"><i class="fas fa-comment"></i> ${commentsCount}</button>${isAdmin ? `<button class="post-action-btn text-danger" onclick="deletePost('${p.id}')"><i class="fas fa-trash"></i> حذف</button>` : ''}</div><div id="comments-${p.id}" style="display:none" class="post-comments"><div class="mb-2">${commentsHtml}</div><div class="input-group input-group-sm"><input type="text" id="commentInput-${p.id}" class="form-control" placeholder="أضف تعليق..."><button class="btn bg btn-sm" onclick="addComment('${p.id}')"><i class="fas fa-paper-plane"></i></button></div></div></div>`;
}
function toggleComments(id){ const sec = document.getElementById(`comments-${id}`); if(sec) sec.style.display = sec.style.display === 'none' ? 'block' : 'none'; }
function likePost(id){
  const visitorId = sessionStorage.getItem('visitorId') || 'guest_' + Date.now();
  if(!sessionStorage.getItem('visitorId')) sessionStorage.setItem('visitorId', visitorId);
  const likeRef = db.ref(`posts/${id}/likes/${visitorId}`);
  likeRef.once('value', snap => { if(snap.exists()) likeRef.remove(); else likeRef.set(true); loadPosts(); });
}
function addComment(id){
  const input = document.getElementById(`commentInput-${id}`); const text = input?.value?.trim();
  if(!text) return;
  db.ref(`posts/${id}/comments`).push({ name: isAdmin ? 'الإدارة' : 'زائر', text: text, date: new Date().toLocaleTimeString('ar-EG') }).then(() => { if(input) input.value = ''; loadPosts(); });
}
function showCreatePost(){
  Swal.fire({ title: 'منشور جديد', html: `<textarea id="postContent" class="swal2-textarea" placeholder="محتوى المنشور..." rows="4"></textarea><input type="url" id="postMedia" class="form-control mt-2" placeholder="رابط وسائط (صورة/فيديو/يوتيوب)">`, showCancelButton: true, confirmButtonText: 'نشر', preConfirm: () => ({ content: document.getElementById('postContent').value.trim(), mediaUrl: document.getElementById('postMedia').value.trim() }) }).then(res => {
    if(res.isConfirmed && res.value.content){
      db.ref('posts').push({ content: res.value.content, mediaUrl: res.value.mediaUrl || null, author: isAdmin ? 'إدارة المدرسة' : 'معلم', timestamp: Date.now(), date: new Date().toLocaleDateString('ar-EG'), likes: {}, comments: [] }).then(() => { toast('تم النشر','s'); showPosts(); });
    } else toast('يرجى كتابة المحتوى','w');
  });
}
function deletePost(id){ Swal.fire({title:'حذف المنشور?',icon:'warning',showCancelButton:true,confirmButtonText:'حذف'}).then(res=>{ if(res.isConfirmed) db.ref(`posts/${id}`).remove().then(()=>{ toast('تم الحذف','i'); showPosts(); }); }); }

// Students & Results Management
function showStudents(){
  hideHero();
  document.getElementById('MC').innerHTML = `<div class="fi"><div class="d-flex justify-content-between mb-3"><h4><i class="fas fa-user-graduate"></i> شئون الطلاب</h4>${isAdmin ? '<button class="btn bg btn-sm" onclick="showResultsManager()"><i class="fas fa-chart-line"></i> إدارة النتائج</button>' : ''}</div><div class="p-3 rounded-4 mb-3 bg-light"><div class="row g-2"><div class="col-md-6"><select id="GS" class="form-select">${Object.entries(GL).map(([v,n])=>`<option value="${v}">${n}</option>`).join('')}</select></div><div class="col-md-6"><input type="text" id="SI" class="form-control" placeholder="رقم الجلوس" onkeydown="if(event.key==='Enter')doSearch()"></div></div></div><button class="btn btn-primary w-100 mb-3" onclick="doSearch()"><i class="fas fa-search"></i> استعلام</button><div id="RD"></div></div>`;
}
function doSearch(){
  const grade = document.getElementById('GS')?.value, seat = document.getElementById('SI')?.value?.trim();
  if(!seat){ toast('أدخل رقم الجلوس','w'); return; }
  const rd = document.getElementById('RD'); rd.innerHTML = '<div class="text-center p-5"><div class="spinner-border"></div></div>';
  db.ref(`results/${grade}/${seat}`).once('value', snap => {
    if(!snap.exists()){ rd.innerHTML = `<div class="alert alert-danger">رقم الجلوس ${seat} غير مسجل</div>`; return; }
    const d = snap.val(); let subHtml = '';
    if(d.subjects) Object.entries(d.subjects).forEach(([sub,score]) => { subHtml += `<div class="si2"><span>${esc(sub)}</span><span class="fw-bold">${score}</span></div>`; });
    rd.innerHTML = `<div class="rc p-4" style="background:linear-gradient(135deg,var(--pr),#1a4070);color:white;border-radius:var(--r)"><div class="text-center"><i class="fas fa-graduation-cap fa-3x mb-2"></i><h3>${esc(d.name)}</h3><span class="badge bg-warning text-dark">${GL[grade]}</span><div>رقم الجلوس: ${seat}</div></div><div class="my-3">${subHtml}</div><div class="row text-center"><div class="col-4"><div class="rsb">المجموع<br><strong>${d.total}</strong></div></div><div class="col-4"><div class="rsb">النسبة<br><strong>${d.percentage}%</strong></div></div><div class="col-4"><div class="rsb">التقدير<br><strong>${d.grade}</strong></div></div></div><button class="btn bg w-100 mt-3" onclick="exportStudentPDF(${JSON.stringify({name:d.name,grade,seat,subjects:d.subjects,total:d.total,percentage:d.percentage,gradeLabel:d.grade}).replace(/"/g,'&quot;')})"><i class="fas fa-file-pdf"></i> تحميل PDF</button></div>`;
  });
}
function exportStudentPDF(data){
  if(typeof data === 'string') data = JSON.parse(data);
  toast('جاري إنشاء PDF...','i');
  let subRows = '';
  if(data.subjects) Object.entries(data.subjects).forEach(([sub,score]) => subRows += `<tr><td>${sub}</td><td>${score}</td></tr>`);
  const card = document.getElementById('pdfCard'); card.innerHTML = `<div style="padding:20px"><h3>مدرسة سعد بن أبي وقاص</h3><h4>نتيجة الطالب</h4><p>الاسم: ${data.name}</p><p>الصف: ${GL[data.grade]}</p><p>رقم الجلوس: ${data.seat}</p><table border="1" cellpadding="5" style="width:100%"><tr><th>المادة</th><th>الدرجة</th></tr>${subRows}<tr><th>المجموع</th><th>${data.total}</th></tr><tr><th>النسبة</th><th>${data.percentage}%</th></tr><tr><th>التقدير</th><th>${data.gradeLabel}</th></tr></table></div>`;
  html2canvas(card, {scale:2}).then(canvas => { const pdf = new jspdf.jsPDF(); const img = canvas.toDataURL('image/png'); pdf.addImage(img, 'PNG', 0, 0, 210, 297); pdf.save(`نتيجة_${data.name}.pdf`); toast('تم التحميل','s'); });
}
function showResultsManager(){
  hideHero();
  document.getElementById('MC').innerHTML = `<div class="fi"><button class="btn btn-outline-secondary btn-sm mb-3" onclick="showStudents()"><i class="fas fa-arrow-right"></i> رجوع</button><div class="results-manager"><h5><i class="fas fa-upload"></i> رفع نتائج JSON</h5><div class="json-upload-area mt-3" onclick="document.getElementById('jsonFile').click()"><i class="fas fa-cloud-upload-alt fa-3x"></i><p>اضغط لرفع ملف JSON</p><small>يحتوي على نتائج الطلاب حسب الصف</small></div><input type="file" id="jsonFile" accept=".json" style="display:none" onchange="uploadJSON(this)"></div><div id="resultsList" class="mt-4"></div></div>`;
  loadResultsList();
}
function uploadJSON(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const data = JSON.parse(e.target.result);
      Swal.fire({title:'تأكيد الرفع',text:`سيتم استبدال النتائج الحالية لـ ${Object.keys(data).length} صف`,icon:'question',showCancelButton:true}).then(res => {
        if(res.isConfirmed){
          const updates = {};
          for(const [grade, students] of Object.entries(data)) for(const [seat, info] of Object.entries(students)) updates[`results/${grade}/${seat}`] = info;
          db.ref().update(updates).then(()=>{ toast('تم رفع النتائج','s'); loadResultsList(); });
        }
      });
    }catch(err){ toast('ملف غير صالح','e'); }
  };
  reader.readAsText(file);
}
function loadResultsList(){
  const container = document.getElementById('resultsList');
  db.ref('results').once('value', snap => {
    if(!snap.exists()){ container.innerHTML = '<p class="text-muted">لا توجد نتائج</p>'; return; }
    let html = '<div class="list-group">';
    snap.forEach(grade => { html += `<div class="list-group-item d-flex justify-content-between"><span>${GL[grade.key]||grade.key}</span><span class="badge bg-primary">${grade.numChildren()} طالب</span>${isAdmin ? '<button class="btn btn-sm btn-outline-danger" onclick="deleteGradeResults(\''+grade.key+'\')"><i class="fas fa-trash"></i></button>' : ''}</div>`; });
    html += '</div>'; container.innerHTML = html;
  });
}
function deleteGradeResults(grade){ Swal.fire({title:'حذف النتائج؟',text:`حذف نتائج ${GL[grade]}`,icon:'warning',showCancelButton:true}).then(res=>{ if(res.isConfirmed) db.ref(`results/${grade}`).remove().then(()=>{ toast('تم الحذف','i'); loadResultsList(); }); }); }

// Files Gallery System (with YouTube/Vimeo support and size limits)
function showFiles(section, title){
  hideHero(); activeFilter='all'; filesCache={};
  document.getElementById('MC').innerHTML = `<div class="fi"><div class="d-flex justify-content-between"><h4>${title}</h4>${isAdmin ? `<button class="btn bg btn-sm" onclick="showUpload('${section}','${title}')"><i class="fas fa-upload"></i> رفع</button>` : ''}</div><div class="sfb mt-2"><div class="si"><i class="fas fa-search"></i><input type="text" id="FSI" placeholder="بحث..." oninput="renderFiles('${section}')"></div><div id="FBG"><button class="fb active" onclick="setFilter(this,'all')">الكل</button><button class="fb" onclick="setFilter(this,'img')">صور</button><button class="fb" onclick="setFilter(this,'vid')">فيديو</button><button class="fb" onclick="setFilter(this,'youtube')"><i class="fab fa-youtube"></i> يوتيوب</button><button class="fb" onclick="setFilter(this,'pdf')">PDF</button></div><span id="FCB">0 ملف</span></div><div id="FG" class="row g-3"></div></div>`;
  db.ref(section).orderByChild('timestamp').once('value', snap => { snap.forEach(c => filesCache[c.key]=c.val()); renderFiles(section); });
}
function setFilter(btn, f){ activeFilter=f; document.querySelectorAll('#FBG .fb').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderFiles(); }
function renderFiles(section){
  const grid = document.getElementById('FG'); if(!grid) return;
  const q = (document.getElementById('FSI')?.value||'').toLowerCase();
  const typeCheck = f => { if(f.isYouTube || isYouTube(f.url)) return 'youtube'; if(isImg(f.url)) return 'img'; if(isVid(f.url)) return 'vid'; if(isPdf(f.url)) return 'pdf'; return 'doc'; };
  let items = Object.entries(filesCache).filter(([,f])=>(activeFilter==='all'||typeCheck(f)===activeFilter) && (!q||f.title?.toLowerCase().includes(q)));
  items.sort((a,b)=> (b[1].timestamp||0) - (a[1].timestamp||0));
  document.getElementById('FCB').innerText = `${items.length} ملف`;
  if(!items.length){ grid.innerHTML = '<div class="col-12 text-center p-5"><div class="esi">📂</div><p>لا توجد ملفات</p></div>'; return; }
  grid.innerHTML = items.map(([id,f])=>{
    const url = f.url; const isYt = f.isYouTube || isYouTube(url); const ytId = isYt ? getYouTubeId(url) : null;
    let media = '';
    if(isYt && ytId) media = `<div class="fc-media" style="cursor:pointer" onclick="openMediaModal('https://www.youtube.com/embed/${ytId}','${f.title}','youtube')"><img src="https://img.youtube.com/vi/${ytId}/mqdefault.jpg"><div class="fc-media-overlay"><div class="fc-play-btn"><i class="fab fa-youtube fa-2x"></i></div></div></div>`;
    else if(isImg(url)) media = `<div class="fc-media" onclick="openMediaModal('${url}','${f.title}','img')"><img src="${url}" loading="lazy"><div class="fc-media-overlay"><div class="fc-play-btn"><i class="fas fa-search-plus"></i></div></div></div>`;
    else if(isVid(url)) media = `<div class="fc-media" onclick="openMediaModal('${url}','${f.title}','vid')"><video src="${url}" style="height:100%;width:100%;object-fit:cover"></video><div class="fc-media-overlay"><div class="fc-play-btn"><i class="fas fa-play"></i></div></div></div>`;
    else media = `<div class="fc-icon-wrap" style="height:150px;display:flex;align-items:center;justify-content:center"><i class="fas fa-file-pdf fa-4x text-danger"></i></div>`;
    return `<div class="col-md-6"><div class="fc">${media}<div class="fc-body"><div class="fc-title">${esc(f.title)}</div><div class="fc-meta small text-muted">${f.uploadedAt||''}</div><div class="fc-actions">${isYt ? `<button class="fc-btn-primary" onclick="openMediaModal('https://www.youtube.com/embed/${ytId}','${f.title}','youtube')"><i class="fab fa-youtube"></i> تشغيل</button>` : isImg(url) ? `<button class="fc-btn-primary" onclick="openMediaModal('${url}','${f.title}','img')">عرض</button>` : isVid(url) ? `<button class="fc-btn-primary" onclick="openMediaModal('${url}','${f.title}','vid')">تشغيل</button>` : `<a href="${url}" target="_blank" class="fc-btn-primary">فتح</a>`}<a href="${url}" download class="fc-btn-icon"><i class="fas fa-download"></i></a>${isAdmin ? `<button class="fc-btn-icon text-danger" onclick="deleteFile('${section}','${id}')"><i class="fas fa-trash"></i></button>` : ''}</div></div></div></div>`;
  }).join('');
}
function openMediaModal(src, title, type){
  let body = '';
  if(type === 'youtube') body = `<div class="youtube-embed"><iframe src="${src}?autoplay=1" frameborder="0" allowfullscreen></iframe></div>`;
  else if(type === 'img') body = `<img src="${src}" style="max-width:100%;max-height:80vh">`;
  else if(type === 'vid') body = `<video controls autoplay src="${src}" style="max-width:100%;max-height:80vh"></video>`;
  Swal.fire({ html: body, showConfirmButton: false, showCloseButton: true, width: '90%', padding: 0 });
}
function deleteFile(section, id){ Swal.fire({title:'حذف?',icon:'warning',showCancelButton:true}).then(res=>{ if(res.isConfirmed) db.ref(`${section}/${id}`).remove().then(()=>toast('تم الحذف','i')); }); }
function showUpload(section, title){
  document.getElementById('MC').innerHTML = `<div class="fi"><button class="btn btn-outline-secondary btn-sm mb-3" onclick="showFiles('${section}','${title}')"><i class="fas fa-arrow-right"></i> رجوع</button><h5>رفع ملف جديد</h5><input type="text" id="UT" class="form-control mb-2" placeholder="العنوان"><textarea id="UD" class="form-control mb-2" rows="2" placeholder="وصف"></textarea><div class="btn-group mb-3"><button class="btn btn-sm btn-primary" onclick="setUploadMode('file')">📁 رفع ملف</button><button class="btn btn-sm btn-outline-danger" onclick="setUploadMode('youtube')"><i class="fab fa-youtube"></i> يوتيوب</button></div><div id="fileArea"><div class="uz" onclick="document.getElementById('ufile').click()"><i class="fas fa-cloud-upload-alt fa-3x"></i><p>اختر ملف (حد أقصى 10MB للصور/مستندات، 200MB للفيديو)</p></div><input type="file" id="ufile" style="display:none" onchange="handleFileSelect(this)"></div><div id="linkArea" style="display:none"><input type="url" id="videoLink" class="form-control" placeholder="رابط يوتيوب أو فيميو"></div><div class="up mt-2" id="upBar"><div class="upb" id="upFill"></div></div><button class="btn bg w-100 mt-3" onclick="processUpload('${section}','${title}')"><i class="fas fa-upload"></i> رفع</button></div>`;
  setUploadMode('file'); window.selectedFile = null;
}
function setUploadMode(mode){ window.uploadMode = mode; document.getElementById('fileArea').style.display = mode==='file'?'block':'none'; document.getElementById('linkArea').style.display = mode==='file'?'none':'block'; }
function handleFileSelect(input){ const file = input.files[0]; if(!file) return;
  const isVideo = /\.(mp4|mov|avi|mkv|webm)$/i.test(file.name);
  const maxSize = isVideo ? 200 * 1024 * 1024 : 10 * 1024 * 1024;
  if(file.size > maxSize){ toast(`حجم الملف يتجاوز ${maxSize/(1024*1024)}MB`,'e'); return; }
  window.selectedFile = file; toast(`تم اختيار: ${file.name}`,'s');
}
async function processUpload(section, title){
  const titleText = document.getElementById('UT')?.value.trim();
  if(!titleText){ toast('أدخل عنواناً','w'); return; }
  const desc = document.getElementById('UD')?.value.trim() || '';
  if(window.uploadMode === 'file'){
    if(!window.selectedFile){ toast('اختر ملفاً','w'); return; }
    const file = window.selectedFile; const isVideo = /\.(mp4|mov|avi|mkv|webm)$/i.test(file.name);
    const resourceType = isVideo ? 'video' : 'image';
    const btn = event.target; btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
    document.getElementById('upBar').style.display = 'block';
    const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', CLD_PRESET_RAW); fd.append('folder', `school/${section}`);
    const xhr = new XMLHttpRequest();
    xhr.upload.onprogress = e => { if(e.lengthComputable) document.getElementById('upFill').style.width = (e.loaded/e.total*100)+'%'; };
    xhr.onload = () => { if(xhr.status===200){ const res = JSON.parse(xhr.responseText); const url = res.secure_url;
      db.ref(section).push({ title:titleText, description:desc, url:url, timestamp:Date.now(), uploadedAt:new Date().toLocaleDateString('ar-EG'), comments:{} }).then(()=>{ toast('تم الرفع','s'); showFiles(section,title); });
    } else { toast('فشل الرفع','e'); btn.disabled=false; btn.innerHTML='<i class="fas fa-upload"></i> رفع'; } };
    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLD_CLOUD}/${resourceType}/upload`);
    xhr.send(fd);
  } else {
    const link = document.getElementById('videoLink')?.value.trim();
    if(!link || (!isYouTube(link) && !isVimeo(link))){ toast('رابط يوتيوب أو فيميو غير صالح','w'); return; }
    db.ref(section).push({ title:titleText, description:desc, url:link, isYouTube:isYouTube(link), isVimeo:isVimeo(link), timestamp:Date.now(), uploadedAt:new Date().toLocaleDateString('ar-EG') }).then(()=>{ toast('تم إضافة الرابط','s'); showFiles(section,title); });
  }
}

// News, Ticker, Home
function showNews(){
  hideHero();
  document.getElementById('MC').innerHTML = `<div class="fi"><h4><i class="fas fa-bullhorn"></i> أخبار المدرسة</h4><div id="newsList"></div></div>`;
  db.ref('school_news').orderByChild('timestamp').once('value', snap => { let news=[]; snap.forEach(c=>news.unshift(c.val())); document.getElementById('newsList').innerHTML = news.map(n=>`<div class="nc p-3 mb-2 rounded-3 bg-white shadow-sm"><h6>${n.title}</h6><p>${n.body}</p><small>${n.dateStr}</small></div>`).join(''); });
}
function showHome(){ showHero(); document.getElementById('MC').innerHTML = `<div class="fi text-center"><div class="gp m-auto mb-3" style="width:80px;height:80px;background:linear-gradient(135deg,var(--pr),var(--pr2));border-radius:50%;display:flex;align-items:center;justify-content:center"><i class="fas fa-school fa-2x text-white"></i></div><h2>مرحباً في البوابة الرقمية</h2><p class="text-muted">نظام متكامل للمدرسة والنتائج والمكتبة</p><div class="row g-3 mt-3"><div class="col-4"><div class="hsc"><div class="sn text-primary">${statsData.studentsCount}</div><small>طالب</small></div></div><div class="col-4"><div class="hsc"><div class="sn text-success">${statsData.teachersCount}</div><small>معلم</small></div></div><div class="col-4"><div class="hsc"><div class="sn" style="color:var(--gd)">${statsData.activitiesCount}</div><small>نشاط</small></div></div></div><div class="row g-2 mt-4"><div class="col-6 col-md-3"><div class="qc" onclick="go('posts')"><i class="fas fa-newspaper"></i><h6>منشورات</h6></div></div><div class="col-6 col-md-3"><div class="qc" onclick="go('students')"><i class="fas fa-search"></i><h6>نتائج</h6></div></div><div class="col-6 col-md-3"><div class="qc" onclick="go('gallery')"><i class="fas fa-images"></i><h6>معرض</h6></div></div><div class="col-6 col-md-3"><div class="qc" onclick="go('library')"><i class="fas fa-book"></i><h6>مكتبة</h6></div></div></div></div>`; }
function loadTicker(){ db.ref('ticker_news').once('value', snap => { const wr = document.getElementById('TKW'); if(!wr) return; let items = ['مرحباً بكم في بوابة مدرسة سعد بن أبي وقاص']; if(snap.exists()) snap.forEach(c=>items.push(c.val().text)); wr.innerHTML = items.map(t=>`<span class="ti">⭐ ${esc(t)}</span>`).join(''); }); }
function loadSlider(){ const slides = [{url:'https://picsum.photos/id/20/1200/400', cap:'مدرستنا.. بيئة تعليمية متميزة'},{url:'https://picsum.photos/id/100/1200/400', cap:'نحو مستقبل رقمي أفضل'}]; const wr = document.getElementById('SWWR'); if(wr) wr.innerHTML = slides.map(s=>`<div class="swiper-slide"><img src="${s.url}"><div class="sc2">${s.cap}</div></div>`).join(''); if(swiperInst) swiperInst.destroy(); swiperInst = new Swiper('#HSW', {loop:true, autoplay:{delay:4000}, pagination:{el:'.swiper-pagination'}, navigation:{nextEl:'.swiper-button-next',prevEl:'.swiper-button-prev'}}); }

// Admin & Navigation
function doAdmin(){
  if(isAdmin){ isAdmin=false; updateAdminUI(); toast('تم تسجيل الخروج','i'); return; }
  Swal.fire({title:'دخول الإدارة',input:'password',inputLabel:'كلمة السر',showCancelButton:true}).then(res=>{ if(res.isConfirmed && btoa(res.value)===SECRET_KEY){ isAdmin=true; updateAdminUI(); toast('تم تفعيل الإدارة','s'); } else toast('كلمة سر غير صحيحة','e'); });
}
function updateAdminUI(){ document.getElementById('ALB').innerText = isAdmin ? 'تسجيل خروج' : 'لوحة الإدارة'; document.getElementById('drawerAdminLabel').innerText = isAdmin ? 'تسجيل خروج' : 'الإدارة'; document.getElementById('ABG').innerHTML = isAdmin ? '<div class="ab mt-2"><i class="fas fa-shield-alt"></i> وضع الإدارة</div>' : ''; }
function go(page){ scrollTo({top:0}); if(page==='home') showHome(); else if(page==='posts') showPosts(); else if(page==='students') showStudents(); else if(page==='gallery') showFiles('gallery_section','📸 المعرض الرقمي'); else if(page==='news') showNews(); else if(page==='art') showFiles('art_section','🎨 التربية الفنية'); else if(page==='library') showFiles('library_section','📚 المكتبة الرقمية'); }
function hideHero(){ document.getElementById('SWC').style.display='none'; document.getElementById('TKC').style.display='none'; }
function showHero(){ document.getElementById('SWC').style.display=''; document.getElementById('TKC').style.display=''; }
function toggleTheme(){ document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark')?'dark':'light'); document.querySelector('.fab-th i').className = document.body.classList.contains('dark')?'fas fa-sun':'fas fa-moon'; }
function openDrawer(){ document.getElementById('drawer').classList.add('open'); document.getElementById('drawerOverlay').classList.add('open'); document.body.style.overflow='hidden'; }
function closeDrawer(){ document.getElementById('drawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('open'); document.body.style.overflow=''; }

// Init
window.addEventListener('load', () => {
  if(localStorage.getItem('theme') === 'dark') toggleTheme();
  loadStats(); loadTicker(); loadSlider(); 
  setTimeout(() => document.getElementById('ldr')?.classList.add('hide'), 800);
  showHome();
  window.addEventListener('scroll', () => document.getElementById('STB')?.classList.toggle('show', window.scrollY > 200));
  // Visitor ID for likes
  if(!sessionStorage.getItem('visitorId')) sessionStorage.setItem('visitorId', 'user_' + Date.now());
});
</script>
