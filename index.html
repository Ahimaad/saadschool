<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة سعد بن أبي وقاص - النظام المتكامل</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --main-blue: #0a2b4e; --gold: #d4af37; }
        body { font-family: 'Cairo', sans-serif; background: #f0f4f8; direction: rtl; }
        .main-header { background: var(--main-blue); color: white; padding: 20px; border-bottom: 5px solid var(--gold); }
        .school-logo { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--gold); background: white; }
        .glass-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn-side { background: #f8f9fa; border-radius: 15px; padding: 15px; margin-bottom: 12px; width: 100%; text-align: right; font-weight: bold; border-right: 5px solid var(--gold); transition: 0.3s; }
        .btn-side:hover { background: var(--main-blue); color: var(--gold); transform: translateX(-5px); }
        .subject-item { background: #f8f9fa; margin: 8px 0; padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; }
        footer { background: var(--main-blue); color: white; padding: 15px; margin-top: 30px; text-align: center; }
    </style>
</head>
<body>

<header class="main-header">
    <div class="container d-flex align-items-center gap-3">
        <img src="logo.jpg" class="school-logo" onerror="this.src='https://via.placeholder.com/80'">
        <div>
            <h1 class="fs-3 fw-bold">مدرسة سعد بن أبي وقاص الرسمية للغات</h1>
            <p>نظام النتائج المتكامل - ابتدائي / إعدادي / ثانوي</p>
        </div>
        <button class="btn btn-outline-light ms-auto" onclick="showAdminLogin()">🔐 مشرف</button>
    </div>
</header>

<div class="container my-4">
    <div class="row">
        <div class="col-lg-4">
            <div class="glass-card">
                <button class="btn-side" onclick="openSection('results')">📊 النتائج المفصلة</button>
                <button class="btn-side" onclick="openSection('gallery')">🖼️ المعارض والمقالات</button>
                <button class="btn-side" onclick="openSection('stats')">📈 الإحصائيات العامة</button>
                <button class="btn-side" onclick="openSection('contact')">📞 تواصل مع المدرسة</button>
            </div>
        </div>
        <div class="col-lg-8">
            <div id="dynamicContent" class="glass-card text-center p-4">
                <i class="fas fa-hand-point-right fa-3x text-primary mb-3"></i>
                <h5>اختر أحد الأقسام من القائمة الجانبية</h5>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 مدرسة سعد بن أبي وقاص - جميع الحقوق محفوظة</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    // --------------------- Firebase Config ---------------------
    const firebaseConfig = {
        apiKey: "AIzaSyC79JwFiDucsph3T8PTKntbk_VE1ANFTxg",
        authDomain: "saad-school-portal.firebaseapp.com",
        databaseURL: "https://saad-school-portal-default-rtdb.firebaseio.com",
        projectId: "saad-school-portal",
        storageBucket: "saad-school-portal.firebasestorage.app",
        messagingSenderId: "1085838136773",
        appId: "1:1085838136773:web:0d200edd01bd12fb0a27ac"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isAdmin = false;
    const ADMIN_PASSWORD = "admin123";

    // قائمة الصفوف مع كودها واسمها
    const gradesList = [
        { code: "p3", name: "الصف الثالث الابتدائي" }, { code: "p4", name: "الصف الرابع الابتدائي" },
        { code: "p5", name: "الصف الخامس الابتدائي" }, { code: "p6", name: "الصف السادس الابتدائي" },
        { code: "m1", name: "الصف الأول الإعدادي" }, { code: "m2", name: "الصف الثاني الإعدادي" },
        { code: "m3", name: "الصف الثالث الإعدادي" }, { code: "s1", name: "الصف الأول الثانوي" },
        { code: "s2", name: "الصف الثاني الثانوي" }
    ];

    function openSection(section) {
        const container = document.getElementById('dynamicContent');
        if (section === 'results') {
            let options = '';
            gradesList.forEach(g => options += `<option value="${g.code}">${g.name}</option>`);
            container.innerHTML = `
                <h4 class="mb-3"><i class="fa fa-search"></i> استعلام النتيجة المفصلة</h4>
                <select id="gradeSelect" class="form-select mb-2">${options}</select>
                <input type="text" id="seatNum" class="form-control mb-2" placeholder="رقم الجلوس">
                <button class="btn btn-primary w-100" onclick="fetchResult()">بحث</button>
                <div id="resultBox" class="mt-4"></div>
            `;
        }
        else if (section === 'gallery') {
            container.innerHTML = `<h4>🖼️ معرض الصور والمقالات</h4><div id="galleryGrid" class="row mt-3"></div>`;
            loadGallery();
        }
        else if (section === 'stats') {
            container.innerHTML = `<h4>📈 إحصائيات المدرسة</h4><div id="statsBox"></div>`;
            loadStats();
        }
        else if (section === 'contact') {
            container.innerHTML = `
                <h4>✉️ تواصل مع المدرسة</h4>
                <form onsubmit="sendMessage(event)"><input type="text" id="cName" class="form-control mb-2" placeholder="الاسم" required>
                <input type="email" id="cEmail" class="form-control mb-2" placeholder="البريد الإلكتروني" required>
                <textarea id="cMsg" class="form-control mb-2" rows="3" placeholder="رسالتك" required></textarea>
                <button class="btn btn-success">إرسال</button></form>
            `;
        }
    }

    // عرض النتيجة بالمفصل - كل المواد حسب الصف
    function fetchResult() {
        const grade = document.getElementById('gradeSelect').value;
        const seat = document.getElementById('seatNum').value;
        const box = document.getElementById('resultBox');
        if (!seat) { Swal.fire('تنبيه', 'أدخل رقم الجلوس', 'warning'); return; }
        box.innerHTML = '<div class="spinner-border text-primary"></div> جاري البحث...';

        db.ref(`results/${grade}/${seat}`).once('value').then(snap => {
            if (!snap.exists()) { box.innerHTML = '<div class="alert alert-danger">❌ لا توجد نتيجة لهذا الرقم</div>'; return; }
            const d = snap.val();
            let subjectsHtml = '';
            let subjectsNames = [];
            let subjectsScores = [];

            for (let [sub, score] of Object.entries(d.subjects || {})) {
                subjectsHtml += `<div class="subject-item"><span>📘 ${sub}</span><span><strong>${score} درجة</strong></span></div>`;
                subjectsNames.push(sub);
                subjectsScores.push(score);
            }

            box.innerHTML = `
                <div class="result-card p-3 border rounded">
                    <div class="text-center"><img src="logo.jpg" style="width:60px"><h5>${d.name}</h5><p>${d.class} - رقم الجلوس: ${seat}</p></div>
                    <hr>${subjectsHtml}<hr>
                    <div class="row text-center">
                        <div class="col-4"><strong>المجموع الكلي</strong><br>${d.total}</div>
                        <div class="col-4"><strong>النسبة المئوية</strong><br>${d.percentage || (d.total/10)}%</div>
                        <div class="col-4"><strong>التقدير</strong><br><span class="badge bg-success">${d.grade || 'جيد جدا'}</span></div>
                    </div>
                    <canvas id="subChart" class="mt-3"></canvas>
                    <div class="mt-3 text-center"><button class="btn btn-success btn-sm" onclick="window.print()">🖨️ طباعة</button></div>
                </div>
            `;
            if (subjectsNames.length) {
                new Chart(document.getElementById('subChart'), { type: 'bar', data: { labels: subjectsNames, datasets: [{ label: 'الدرجات', data: subjectsScores, backgroundColor: '#d4af37' }] } });
            }
        });
    }

    function loadGallery() {
        const container = document.getElementById('galleryGrid');
        container.innerHTML = '<div class="spinner-border"></div>';
        db.ref('posts').once('value').then(snap => {
            container.innerHTML = '';
            if (!snap.exists()) { container.innerHTML = '<div class="alert alert-info">لا توجد صور أو مقالات بعد</div>'; return; }
            snap.forEach(child => {
                let p = child.val();
                container.innerHTML += `<div class="col-md-6 mb-3"><div class="card"><img src="${p.url || p.image}" class="card-img-top" style="height:180px; object-fit:cover"><div class="card-body"><h6>${p.title}</h6><p>${p.description || p.content?.substring(0,80)}</p><small class="text-muted">👤 ${p.student || 'طالب'} - ${p.grade || 'عام'}</small></div></div></div>`;
            });
        });
    }

    function loadStats() {
        const container = document.getElementById('statsBox');
        container.innerHTML = '<div class="spinner-border"></div>';
        Promise.all([db.ref('posts').once('value'), db.ref('messages').once('value')]).then(([postsSnap, msgSnap]) => {
            container.innerHTML = `<div class="row"><div class="col-md-6"><div class="alert alert-primary">📄 المنشورات: ${postsSnap.numChildren()}</div></div><div class="col-md-6"><div class="alert alert-success">💬 الرسائل: ${msgSnap.numChildren()}</div></div></div><div class="alert alert-warning">📊 نسبة النجاح الإجمالية: 94%</div>`;
        });
    }

    function sendMessage(e) {
        e.preventDefault();
        db.ref('messages').push({ name: document.getElementById('cName').value, email: document.getElementById('cEmail').value, message: document.getElementById('cMsg').value, date: new Date().toLocaleString() });
        Swal.fire('✅ تم الإرسال', 'سيتم الرد عليك قريباً', 'success');
        e.target.reset();
    }

    function showAdminLogin() {
        Swal.fire({ title: 'دخول المشرف', input: 'password', inputLabel: 'كلمة السر', showCancelButton: true }).then(res => {
            if (res.value === ADMIN_PASSWORD) { isAdmin = true; Swal.fire('مرحباً مشرف', '', 'success'); openSection('gallery'); }
            else if (res.value) Swal.fire('خطأ', 'كلمة سر غير صحيحة', 'error');
        });
    }

    window.openSection = openSection;
    window.fetchResult = fetchResult;
    window.showAdminLogin = showAdminLogin;
    window.sendMessage = sendMessage;

    openSection('results');
</script>
</body>
</html>
