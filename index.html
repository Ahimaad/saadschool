<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a2b4e">
<title>بوابة مدرسة سعد بن أبي وقاص</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
:root{--pr:#0a2b4e;--pr2:#1e4a76;--gd:#d4af37;--bg:#eef1f7}
body{background:var(--bg);color:#1e2a3e}
.dark{background:#0b0f1a!important;color:#dde3ee}
.dark .gc,.dark .post-card{background:#141c2c!important}
header{background:linear-gradient(135deg,var(--pr),#0e3a65);border-bottom:4px solid var(--gd);padding:14px 0;position:sticky;top:0;z-index:100}
.slogo{width:72px;height:72px;border-radius:50%;border:3px solid var(--gd);background:white;padding:4px;object-fit:cover}
.stl{font-weight:900;color:white}
.hbg{background:var(--gd);color:var(--pr);font-weight:800;padding:3px 12px;border-radius:30px;display:inline-block;font-size:.72rem}
.od{width:8px;height:8px;border-radius:50%;background:#2ecc71;display:inline-block;animation:od 2s infinite}
@keyframes od{0%,100%{opacity:1}50%{opacity:.3}}
.tk{background:linear-gradient(90deg,var(--pr),#0e3a65);color:white;padding:8px 0;white-space:nowrap;overflow:hidden}
.tw{display:inline-block;animation:ts 30s linear infinite}
@keyframes ts{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.ti{display:inline-block;padding:0 30px}
.gc{background:rgba(255,255,255,.95);border-radius:20px;padding:20px;box-shadow:0 8px 32px rgba(0,0,0,.1);margin-bottom:20px}
.smi{background:#fff;border:none;border-radius:12px;padding:12px;margin-bottom:8px;width:100%;text-align:right;font-weight:700;transition:all .3s;cursor:pointer;border-right:5px solid var(--gd);display:flex;align-items:center;gap:8px}
.smi:hover{background:var(--pr);color:var(--gd)}
.sc{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-radius:12px;background:#f4f7ff;margin-bottom:7px}
.qc{border-radius:12px;padding:18px 10px;text-align:center;cursor:pointer;background:white;box-shadow:0 2px 8px rgba(0,0,0,.05);transition:all .3s}
.qc:hover{transform:translateY(-5px);box-shadow:0 8px 20px rgba(0,0,0,.15)}
.qc i{font-size:1.9rem;margin-bottom:8px;display:block}
.post-card{background:white;border-radius:20px;padding:18px;margin-bottom:16px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.post-actions{display:flex;gap:16px;padding-top:10px;border-top:1px solid #eee;margin-top:10px}
.pab{background:none;border:none;cursor:pointer;color:#888}
.pab.liked{color:#e74c3c}
.fab-th{position:fixed;bottom:26px;left:26px;background:var(--gd);color:var(--pr);border:none;border-radius:50%;width:52px;height:52px;z-index:500;cursor:pointer}
.fab-st{position:fixed;bottom:26px;left:88px;background:var(--pr);color:white;border:none;border-radius:50%;width:44px;height:44px;z-index:500;cursor:pointer;opacity:0}
.fab-st.show{opacity:1}
#ldr{position:fixed;inset:0;background:var(--pr);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center}
#ldr.hide{opacity:0;visibility:hidden}
.tc{position:fixed;top:80px;left:20px;z-index:9000}
.ti2{background:var(--pr);color:white;padding:10px 16px;border-radius:12px;margin-bottom:5px;border-right:4px solid var(--gd)}
@media(max-width:768px){.hide-mob{display:none!important}.fab-th{bottom:76px}.fab-st{bottom:76px}}
</style>
</head>
<body>
<div id="ldr"><img src="logo.jpg" style="width:80px;border-radius:50%"><p>جاري التحميل...</p></div>
<div class="tc" id="TC"></div>
<button class="fab-th" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
<button class="fab-st" id="STB" onclick="window.scrollTo({top:0})"><i class="fas fa-chevron-up"></i></button>

<header><div class="container"><div class="row align-items-center"><div class="col-md-auto"><img src="logo.jpg" class="slogo" alt="شعار"></div><div class="col"><div class="hbg">إدارة الفشن التعليمية</div><h1 class="stl">مدرسة سعد بن أبي وقاص الرسمية للغات</h1><p><span class="od"></span> النظام يعمل | بوابة الإبداع الرقمي</p></div></div></div></header>

<div class="tk"><div class="tw" id="TKW"><span class="ti">أهلاً بكم في بوابة المدرسة</span><span class="ti">نبارك لطلابنا المتفوقين</span></div></div>

<div class="container my-4"><div class="row g-4">
  <div class="col-lg-4 hide-mob">
    <div class="gc">
      <button class="smi" onclick="go('home')"><i class="fas fa-home"></i> الرئيسية</button>
      <button class="smi" onclick="go('posts')"><i class="fas fa-newspaper"></i> المنشورات <span class="badge bg-warning" id="PC">0</span></button>
      <button class="smi" onclick="go('students')"><i class="fas fa-user-graduate"></i> شئون الطلاب</button>
      <button class="smi" onclick="go('gallery')"><i class="fas fa-images"></i> المعرض الرقمي</button>
      <button class="smi" onclick="go('news')"><i class="fas fa-bullhorn"></i> أخبار المدرسة</button>
      <button class="smi" onclick="doAdmin()"><i class="fas fa-lock"></i> <span id="ALB">لوحة الإدارة</span></button>
    </div>
    <div class="gc">
      <h6><i class="fas fa-chart-bar"></i> إحصائيات المدرسة</h6>
      <div class="sc"><span>الطلاب</span><span class="badge bg-primary stat-edit" id="CS" onclick="editStat('studentsCount')">0</span></div>
      <div class="sc"><span>المعلمون</span><span class="badge bg-success stat-edit" id="CT" onclick="editStat('teachersCount')">0</span></div>
      <div class="sc"><span>الأنشطة</span><span class="badge bg-warning stat-edit" id="CA" onclick="editStat('activitiesCount')">0</span></div>
      <div id="ABG"></div>
    </div>
  </div>
  <div class="col-lg-8">
    <div id="SWC" class="gc"><div class="swiper hs" id="HSW"><div class="swiper-wrapper" id="SWWR"></div><div class="swiper-pagination"></div><div class="swiper-button-next"></div><div class="swiper-button-prev"></div></div></div>
    <div id="MC" class="gc"></div>
  </div>
</div></div>

<footer class="py-4 bg-dark text-white text-center"><p>© 2026 مدرسة سعد بن أبي وقاص الرسمية للغات</p></footer>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
// ========== CONFIG ==========
let db = null, isAdmin = false, adminLock = 0;
let swiperInst = null;
let statsData = { studentsCount: 1250, teachersCount: 85, activitiesCount: 24 };

const SECRET_KEY = 'YWJ1c2FiZXIxMjM=';

function toast(msg, type = 'i') {
  const c = document.getElementById('TC');
  const t = document.createElement('div');
  t.className = `ti2 ${type}`;
  t.innerHTML = `<i class="fas ${type === 's' ? 'fa-check-circle' : 'fa-info-circle'}"></i> ${msg}`;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// Firebase
firebase.initializeApp({
  apiKey: "AIzaSyC79JwFiDucsph3T8PTKntbk_VE1ANFTxg",
  authDomain: "saad-school-portal.firebaseapp.com",
  databaseURL: "https://saad-school-portal-default-rtdb.firebaseio.com",
  projectId: "saad-school-portal",
  messagingSenderId: "1085838136773",
  appId: "1:1085838136773:web:0d200edd01bd12fb0a27ac"
});
db = firebase.database();

// Stats
function loadStats() {
  db.ref('school_stats').on('value', (snap) => {
    const stats = snap.val();
    if (stats) {
      statsData = stats;
      document.getElementById('CS').textContent = (stats.studentsCount || 1250).toLocaleString();
      document.getElementById('CT').textContent = (stats.teachersCount || 85).toLocaleString();
      document.getElementById('CA').textContent = (stats.activitiesCount || 24).toLocaleString();
    } else {
      db.ref('school_stats').set(statsData);
    }
  });
}

function editStat(stat) {
  if (!isAdmin) { toast('متاح للإدارة فقط', 'w'); return; }
  Swal.fire({
    title: 'تعديل القيمة',
    input: 'number',
    inputValue: statsData[stat],
    showCancelButton: true,
    confirmButtonText: 'حفظ'
  }).then(res => {
    if (res.isConfirmed) {
      const v = parseInt(res.value);
      if (!isNaN(v)) {
        statsData[stat] = v;
        db.ref('school_stats/' + stat).set(v);
        document.getElementById(stat === 'studentsCount' ? 'CS' : stat === 'teachersCount' ? 'CT' : 'CA').textContent = v.toLocaleString();
        toast('تم التحديث ✅', 's');
      }
    }
  });
}

// Posts
function showPosts() {
  document.getElementById('MC').innerHTML = `
    <div class="d-flex justify-content-between mb-3">
      <h4><i class="fas fa-newspaper"></i> المنشورات</h4>
      ${isAdmin ? '<button class="btn btn-warning" onclick="showCreatePost()">+ منشور جديد</button>' : ''}
    </div>
    <div id="postsList">جاري التحميل...</div>
  `;
  loadPosts();
}

function loadPosts() {
  db.ref('posts').orderByChild('timestamp').on('value', (snap) => {
    const posts = [];
    snap.forEach(c => posts.push({ id: c.key, ...c.val() }));
    posts.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    document.getElementById('PC').textContent = posts.length;
    
    if (posts.length === 0) {
      document.getElementById('postsList').innerHTML = '<div class="text-center text-muted">لا توجد منشورات</div>';
      return;
    }
    
    const vid = sessionStorage.getItem('vid') || 'v' + Math.random();
    sessionStorage.setItem('vid', vid);
    
    document.getElementById('postsList').innerHTML = posts.map(p => `
      <div class="post-card">
        <div class="d-flex justify-content-between">
          <div><strong>${p.author || 'إدارة المدرسة'}</strong><br><small class="text-muted">${new Date(p.timestamp).toLocaleString()}</small></div>
          ${isAdmin ? `<button class="btn btn-sm btn-danger" onclick="delPost('${p.id}')"><i class="fas fa-trash"></i></button>` : ''}
        </div>
        <div class="post-content mt-2">${p.content}</div>
        <div class="post-actions">
          <button class="pab ${p.likes && p.likes[vid] ? 'liked' : ''}" onclick="likePost('${p.id}')">
            <i class="fas fa-thumbs-up"></i> <span id="likes-${p.id}">${p.likes ? Object.keys(p.likes).length : 0}</span>
          </button>
          <button class="pab" onclick="sharePost('${p.content}')"><i class="fab fa-whatsapp"></i> مشاركة</button>
        </div>
      </div>
    `).join('');
  });
}

function likePost(id) {
  const vid = sessionStorage.getItem('vid');
  const likeRef = db.ref(`posts/${id}/likes/${vid}`);
  likeRef.once('value', snap => {
    if (snap.exists()) likeRef.remove();
    else likeRef.set(true);
  });
}

function sharePost(content) {
  window.open(`https://wa.me/?text=${encodeURIComponent(content + '\nمنصة مدرسة سعد بن أبي وقاص')}`, '_blank');
}

function showCreatePost() {
  Swal.fire({
    title: 'منشور جديد',
    input: 'textarea',
    inputPlaceholder: 'ماذا تريد أن تنشر؟',
    showCancelButton: true,
    confirmButtonText: 'نشر'
  }).then(res => {
    if (res.isConfirmed && res.value) {
      db.ref('posts').push({
        content: res.value,
        author: 'إدارة المدرسة',
        timestamp: Date.now(),
        likes: {},
        comments: []
      }).then(() => toast('تم النشر ✅', 's'));
    }
  });
}

function delPost(id) {
  Swal.fire({ title: 'حذف المنشور؟', icon: 'warning', showCancelButton: true, confirmButtonText: 'احذف' }).then(res => {
    if (res.isConfirmed) db.ref(`posts/${id}`).remove().then(() => toast('تم الحذف', 'i'));
  });
}

// Students & Results
function showStudents() {
  document.getElementById('MC').innerHTML = `
    <div class="d-flex justify-content-between mb-3">
      <h4><i class="fas fa-user-graduate"></i> استعلام النتائج</h4>
      ${isAdmin ? '<button class="btn btn-warning" onclick="showResultsMgr()">رفع JSON</button>' : ''}
    </div>
    <div class="row g-2 mb-3">
      <div class="col-md-6"><select id="gradeSelect" class="form-select"><option value="p6">الصف السادس</option><option value="p5">الصف الخامس</option></select></div>
      <div class="col-md-6"><input type="text" id="seatNo" class="form-control" placeholder="رقم الجلوس"></div>
    </div>
    <button class="btn btn-primary w-100" onclick="searchResult()">استعلام</button>
    <div id="resultDisplay" class="mt-3"></div>
  `;
}

function searchResult() {
  const grade = document.getElementById('gradeSelect').value;
  const seat = document.getElementById('seatNo').value;
  if (!seat) { toast('أدخل رقم الجلوس', 'w'); return; }
  document.getElementById('resultDisplay').innerHTML = '<div class="spinner-border"></div>';
  db.ref(`results/${grade}/${seat}`).once('value', snap => {
    if (!snap.exists()) { document.getElementById('resultDisplay').innerHTML = '<div class="alert alert-danger">未找到结果</div>'; return; }
    const d = snap.val();
    let subHtml = '';
    if (d.subjects) Object.entries(d.subjects).forEach(([sub, score]) => subHtml += `<div class="d-flex justify-content-between border-bottom py-2"><span>${sub}</span><span class="fw-bold">${score}</span></div>`);
    document.getElementById('resultDisplay').innerHTML = `<div class="p-3 bg-primary text-white rounded"><h4>${d.name || ''}</h4>${subHtml}<hr><div class="row"><div class="col-4">المجموع: ${d.total}</div><div class="col-4">النسبة: ${d.percentage}%</div><div class="col-4">التقدير: ${d.grade}</div></div></div>`;
  });
}

function showResultsMgr() {
  document.getElementById('MC').innerHTML = `
    <div><button class="btn btn-sm btn-secondary mb-3" onclick="showStudents()">← رجوع</button></div>
    <div class="gc"><h5>رفع نتائج JSON</h5><div class="json-area" onclick="document.getElementById('jsonFile').click()"><i class="fas fa-file-code fa-3x"></i><p>اختر ملف JSON</p></div><input type="file" id="jsonFile" accept=".json" style="display:none" onchange="uploadJSON(this)"><div id="jsonStatus"></div></div>
  `;
}

function uploadJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const updates = {};
      for (const [grade, students] of Object.entries(data))
        for (const [seat, info] of Object.entries(students))
          updates[`results/${grade}/${seat}`] = info;
      db.ref().update(updates).then(() => toast('تم رفع النتائج ✅', 's'));
    } catch(err) { toast('ملف غير صالح', 'e'); }
  };
  reader.readAsText(file);
}

// Gallery
function showGallery() {
  document.getElementById('MC').innerHTML = `<h4>المعرض الرقمي</h4><div id="galleryGrid" class="row g-3">جاري التحميل...</div>`;
  db.ref('gallery_section').on('value', snap => {
    const items = [];
    snap.forEach(c => items.push(c.val()));
    if (items.length === 0) { document.getElementById('galleryGrid').innerHTML = '<p>لا توجد صور</p>'; return; }
    document.getElementById('galleryGrid').innerHTML = items.map(item => `<div class="col-md-4"><img src="${item.url}" class="img-fluid rounded" style="height:200px;width:100%;object-fit:cover"></div>`).join('');
  });
}

// News
function showNews() {
  document.getElementById('MC').innerHTML = `<h4>أخبار المدرسة</h4><div id="newsList">جاري التحميل...</div>`;
  db.ref('school_news').orderByChild('timestamp').limitToLast(10).on('value', snap => {
    const news = [];
    snap.forEach(c => news.unshift(c.val()));
    document.getElementById('newsList').innerHTML = news.map(n => `<div class="border-bottom pb-2 mb-2"><h6>📌 ${n.title}</h6><p>${n.body}</p><small>${n.dateStr || ''}</small></div>`).join('');
  });
}

// Navigation
function go(page) {
  window.scrollTo({ top: 0 });
  if (page === 'home') {
    document.getElementById('MC').innerHTML = `
      <div class="text-center"><h2>مرحباً بك في بوابتنا الرقمية</h2><p>نسعى لتوفير أفضل تجربة تعليمية</p></div>
      <div class="row g-3 mt-3"><div class="col-4"><div class="qc" onclick="go('students')"><i class="fas fa-search"></i><h6>النتائج</h6></div></div>
      <div class="col-4"><div class="qc" onclick="go('posts')"><i class="fas fa-newspaper"></i><h6>المنشورات</h6></div></div>
      <div class="col-4"><div class="qc" onclick="go('gallery')"><i class="fas fa-images"></i><h6>المعرض</h6></div></div></div>
    `;
  }
  else if (page === 'posts') showPosts();
  else if (page === 'students') showStudents();
  else if (page === 'gallery') showGallery();
  else if (page === 'news') showNews();
}

// Admin
function doAdmin() {
  if (isAdmin) { isAdmin = false; document.getElementById('ALB').innerHTML = 'لوحة الإدارة'; toast('تم الخروج', 'i'); return; }
  Swal.fire({
    title: 'دخول الإدارة',
    input: 'password',
    inputLabel: 'كلمة السر',
    showCancelButton: true,
    confirmButtonText: 'دخول'
  }).then(res => {
    if (res.isConfirmed) {
      try { var enc = btoa(res.value); } catch(e) { enc = btoa(unescape(encodeURIComponent(res.value))); }
      if (enc === SECRET_KEY) { isAdmin = true; document.getElementById('ALB').innerHTML = 'تسجيل الخروج'; toast('مرحباً! تم تفعيل الإدارة', 's'); } 
      else { toast('كلمة سر خاطئة', 'e'); }
    }
  });
}

function toggleTheme() {
  document.body.classList.toggle('dark');
  localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
}

// Slider
function loadSlider() {
  const slides = ['https://picsum.photos/id/20/1200/400', 'https://picsum.photos/id/100/1200/400', 'https://picsum.photos/id/180/1200/400'];
  document.getElementById('SWWR').innerHTML = slides.map(s => `<div class="swiper-slide"><img src="${s}" class="w-100" style="height:250px;object-fit:cover"></div>`).join('');
  new Swiper('#HSW', { loop: true, autoplay: { delay: 4000 }, pagination: { el: '.swiper-pagination' }, navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' } });
}

// Ticker
function loadTicker() {
  db.ref('ticker_news').once('value', snap => {
    const items = [];
    if (snap.exists()) snap.forEach(c => items.push(c.val().text));
    if (items.length) document.getElementById('TKW').innerHTML = items.map(t => `<span class="ti">${t}</span>`).join('');
  });
}

// Start
window.onload = () => {
  loadStats();
  loadTicker();
  loadSlider();
  go('home');
  setTimeout(() => document.getElementById('ldr').classList.add('hide'), 500);
  if (localStorage.getItem('theme') === 'dark') toggleTheme();
  window.addEventListener('scroll', () => document.getElementById('STB').classList.toggle('show', window.scrollY > 200));
};
</script>
</body>
</html>
