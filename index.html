<!DOCTYPE html>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}

body{background:var(--bg);color:#1e2a3e}
.dark{background:#0b0f1a!important;color:#dde3ee}
.dark .gc,.dark .fc,.dark .nc,.dark .qc,.dark .post-card{background:rgba(16,22,36,.96)!important;border-color:rgba(255,255,255,.07)!important}
/* باقي الأنماط مشابهة للأصل – تم حذف التكرار هنا للاختصار، لكن ضعها كاملة من الملف السابق */

<body>
<div id="ldr" style="position:fixed;inset:0;background:var(--pr);display:flex;align-items:center;justify-content:center;z-index:9999"><div class="ld"><span></span><span></span><span></span></div></div>
<div class="tc" id="TC"></div>
<button class="fab-th" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
<button class="fab-st" id="STB" onclick="window.scrollTo({top:0,behavior:'smooth'})"><i class="fas fa-chevron-up"></i></button>
<header>...</header> <!-- نفس الهيدر -->
<div id="TKC" class="tk"><div class="tw" id="TKW"></div></div>
<div class="container my-4"><div class="row g-4"><div class="col-lg-4 hide-mob"><div class="gc" id="SNV">...</div><div class="gc" id="statsBox">...</div></div><div class="col-lg-8"><div id="SWC" class="sw-wrap">...</div><div class="gc" id="MC"></div></div></div></div>
<footer>...</footer>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

<script>
// تهيئة Firebase
const firebaseConfig = {
  apiKey: "AIzaSyC79JwFiDucsph3T8PTKntbk_VE1ANFTxg",
  authDomain: "saad-school-portal.firebaseapp.com",
  databaseURL: "https://saad-school-portal-default-rtdb.firebaseio.com",
  projectId: "saad-school-portal",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let isAdmin = false;
const SECRET_KEY = btoa("abusaber123");
let statsData = { studentsCount: 0, teachersCount: 0, activitiesCount: 0 };

// دوال مساعدة
function toast(msg, type = 'i') { /* نفس السابق */ }
function esc(t) { return t ? t.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}) : ''; }

// تحميل الإحصائيات وحفظها
function loadStats() {
  db.ref('school_stats').once('value').then(snap => {
    if(snap.exists()) statsData = snap.val();
    else { statsData = { studentsCount:1250, teachersCount:85, activitiesCount:24 }; db.ref('school_stats').set(statsData); }
    document.getElementById('CS').textContent = statsData.studentsCount;
    document.getElementById('CT').textContent = statsData.teachersCount;
    document.getElementById('CA').textContent = statsData.activitiesCount;
  });
}
function editStat(stat) {
  if(!isAdmin) return toast('خاص بالإدارة فقط','w');
  Swal.fire({ title: 'تعديل ' + stat, input: 'number', inputValue: statsData[stat], showCancelButton: true }).then(res => {
    if(res.isConfirmed) {
      let v = parseInt(res.value);
      if(!isNaN(v)) {
        statsData[stat] = v;
        db.ref('school_stats').set(statsData);
        document.getElementById(stat==='studentsCount'?'CS':stat==='teachersCount'?'CT':'CA').textContent = v;
        toast('تم التحديث','s');
      }
    }
  });
}

// المنشورات - استماع مباشر للتغييرات
function showPosts() {
  document.getElementById('SWC').style.display = 'none';
  document.getElementById('TKC').style.display = 'none';
  const container = document.getElementById('MC');
  container.innerHTML = `<div class="d-flex justify-content-between mb-3"><h4><i class="fas fa-newspaper"></i> المنشورات</h4>${isAdmin ? '<button class="btn bg btn-sm" onclick="showCreatePost()">+ جديد</button>' : ''}</div><div id="postsList"><div class="text-center p-5"><div class="spinner-border"></div></div></div>`;
  // استماع فوري
  db.ref('posts').orderByChild('timestamp').on('value', snap => {
    let posts = [];
    snap.forEach(c => posts.push({ id: c.key, ...c.val() }));
    posts.sort((a,b)=> (b.timestamp||0) - (a.timestamp||0));
    const pl = document.getElementById('postsList');
    if(!pl) return;
    if(posts.length === 0) { pl.innerHTML = '<div class="alert alert-info">لا توجد منشورات بعد</div>'; return; }
    pl.innerHTML = posts.map(p => renderPost(p)).join('');
    document.getElementById('PC').textContent = posts.length;
  });
}
function renderPost(p) {
  const vid = localStorage.getItem('visitorId') || (Math.random()*1e9).toString(36);
  if(!localStorage.getItem('visitorId')) localStorage.setItem('visitorId', vid);
  const liked = p.likes && p.likes[vid];
  const likesCount = p.likes ? Object.keys(p.likes).length : 0;
  const comments = p.comments || [];
  return `<div class="post-card mb-3 p-3 border rounded" id="post-${p.id}">
    <div class="d-flex align-items-center gap-2"><div class="bg-primary rounded-circle p-2 text-white"><i class="fas fa-user"></i></div><div><b>${esc(p.author||'الإدارة')}</b><br><small class="text-muted">${p.date||''}</small></div>${isAdmin?`<div class="ms-auto"><button class="btn btn-sm btn-outline-primary" onclick="editPost('${p.id}','${esc(p.content).replace(/'/g,"\\'")}','${esc(p.mediaUrl||'')}')"><i class="fas fa-edit"></i></button> <button class="btn btn-sm btn-outline-danger" onclick="delPost('${p.id}')"><i class="fas fa-trash"></i></button></div>`:''}</div>
    <div class="mt-2">${esc(p.content)}</div>
    ${p.mediaUrl ? `<div class="mt-2">${getEmbedHtml(p.mediaUrl)}</div>` : ''}
    <div class="d-flex gap-3 mt-3">
      <button class="btn btn-sm ${liked?'btn-danger':'btn-outline-secondary'}" onclick="likePost('${p.id}')"><i class="fas fa-thumbs-up"></i> ${likesCount}</button>
      <button class="btn btn-sm btn-outline-secondary" onclick="toggleComments('${p.id}')"><i class="fas fa-comment"></i> ${comments.length}</button>
      <button class="btn btn-sm btn-outline-success" onclick="sharePost('${esc(p.content)}')"><i class="fab fa-whatsapp"></i> مشاركة</button>
    </div>
    <div id="comments-${p.id}" style="display:none;" class="mt-3">
      <div id="commentsList-${p.id}">${comments.map(c=>`<div class="border-bottom p-1"><b>${esc(c.name)}</b>: ${esc(c.text)} <small class="text-muted">${c.date||''}</small></div>`).join('')}</div>
      <div class="input-group mt-2"><input type="text" id="commentInput-${p.id}" class="form-control" placeholder="أضف تعليق..."><button class="btn btn-primary" onclick="addComment('${p.id}')">إرسال</button></div>
    </div>
  </div>`;
}
function getEmbedHtml(url) { /* نفس السابق */ return `<iframe src="${url}" width="100%" height="200"></iframe>`; } // مختصر
function likePost(id) {
  const vid = localStorage.getItem('visitorId');
  const likeRef = db.ref(`posts/${id}/likes/${vid}`);
  likeRef.once('value').then(s => { if(s.exists()) likeRef.remove(); else likeRef.set(true); });
}
function toggleComments(id) { const el = document.getElementById(`comments-${id}`); if(el) el.style.display = el.style.display==='none'?'block':'none'; }
function addComment(id) {
  const txt = document.getElementById(`commentInput-${id}`).value.trim();
  if(!txt) return;
  db.ref(`posts/${id}/comments`).push({ name: isAdmin ? 'إدارة المدرسة' : 'زائر', text: txt, date: new Date().toLocaleDateString('ar-EG') }).then(()=> document.getElementById(`commentInput-${id}`).value='');
}
function showCreatePost() { /* نفس السابق */ }
function editPost(id,oldContent,oldMedia) { /* تعديل */ Swal.fire({...}).then(...); }
function delPost(id) { Swal.fire({...}).then(r=>{if(r.isConfirmed) db.ref(`posts/${id}`).remove();}); }
function sharePost(txt) { window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`); }

// الأخبار (مع إضافة إلى التيكر)
function showNews() {
  document.getElementById('SWC').style.display = 'none';
  document.getElementById('TKC').style.display = 'none';
  const container = document.getElementById('MC');
  container.innerHTML = `<div class="d-flex justify-content-between mb-3"><h4><i class="fas fa-bullhorn"></i> أخبار المدرسة</h4>${isAdmin ? '<button class="btn bg btn-sm" onclick="showAddNewsForm()">+ إضافة خبر</button>' : ''}</div><div id="newsList"><div class="spinner-border"></div></div>`;
  db.ref('school_news').orderByChild('timestamp').on('value', snap => {
    let items = []; snap.forEach(c => items.unshift({id:c.key, ...c.val()}));
    const nl = document.getElementById('newsList');
    if(!nl) return;
    if(items.length===0) nl.innerHTML = '<div class="alert alert-info">لا توجد أخبار</div>';
    else nl.innerHTML = items.map(n => `<div class="card mb-2 p-2"><div class="d-flex justify-content-between"><h6>${n.icon||'📌'} ${esc(n.title)}</h6><small>${n.dateStr||''}</small>${isAdmin?`<button class="btn btn-sm btn-danger" onclick="delNews('${n.id}')"><i class="fas fa-trash"></i></button>`:''}</div><p>${esc(n.body)}</p></div>`).join('');
  });
}
function showAddNewsForm() {
  Swal.fire({
    title: 'خبر جديد',
    html: `<input id="newsTitle" class="swal2-input" placeholder="العنوان"><textarea id="newsBody" class="swal2-textarea" placeholder="نص الخبر"></textarea><select id="newsCat" class="swal2-select"><option>عام</option><option>تقنية</option><option>تنبيه</option></select>`,
    preConfirm: () => ({ title: document.getElementById('newsTitle').value, body: document.getElementById('newsBody').value, cat: document.getElementById('newsCat').value })
  }).then(res => {
    if(res.value && res.value.title && res.value.body) {
      const icon = { 'عام':'📌', 'تقنية':'🚀', 'تنبيه':'📢' }[res.value.cat] || '📌';
      const newsData = { title: res.value.title, body: res.value.body, cat: res.value.cat, icon, dateStr: new Date().toLocaleDateString('ar-EG'), timestamp: Date.now() };
      db.ref('school_news').push(newsData).then(() => {
        // إضافة نفس الخبر إلى شريط الأخبار المختصر (ticker) مع اختصار الطول
        let shortText = res.value.title.length > 70 ? res.value.title.substring(0,70)+'…' : res.value.title;
        db.ref('ticker_news').push({ text: shortText });
        toast('تمت الإضافة و إدراجها في الشريط','s');
      });
    }
  });
}
function delNews(id) { db.ref(`school_news/${id}`).remove(); }

// تحميل شريط الأخبار
function loadTicker() {
  db.ref('ticker_news').limitToLast(15).once('value', snap => {
    let items = [];
    snap.forEach(c => items.push(c.val().text));
    if(items.length===0) items = ['أهلاً بكم في بوابة مدرسة سعد بن أبي وقاص', 'نتائج متميزة للفصل الدراسي'];
    const wrapper = document.getElementById('TKW');
    if(wrapper) wrapper.innerHTML = items.map(t => `<span class="ti"><i class="fas fa-circle"></i> ${esc(t)}</span>`).join('');
  });
}

// رفع JSON للنتائج مع اختيار الصف
function showStudents() { /* نفس السابق مع إضافة إدارة النتائج */ }
function showResultsMgr() {
  const container = document.getElementById('MC');
  container.innerHTML = `<div><button class="btn btn-link" onclick="showStudents()">← رجوع</button><h4>رفع نتائج JSON</h4>
  <select id="gradeForJson" class="form-select mb-2">${Object.entries({p3:'الصف الثالث',p4:'الرابع',p5:'الخامس',p6:'السادس',m1:'أول إعدادي',m2:'ثاني إعدادي',m3:'ثالث إعدادي'}).map(([v,n])=>`<option value="${v}">${n}</option>`).join('')}</select>
  <input type="file" id="jsonFile" accept=".json" class="form-control mb-3">
  <button class="btn bg" onclick="uploadJSON()">رفع</button><div id="jsonStatus"></div></div>`;
}
function uploadJSON() {
  const file = document.getElementById('jsonFile').files[0];
  if(!file) return toast('اختر ملف','w');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      let data = JSON.parse(e.target.result);
      let grade = document.getElementById('gradeForJson').value;
      let updates = {};
      let count = 0;
      if(data[grade]) { // الملف يحتوي على الصف ككائن رئيسي
        Object.entries(data[grade]).forEach(([seat, info]) => { updates[`results/${grade}/${seat}`] = info; count++; });
      } else if(typeof data === 'object' && !Array.isArray(data)) { // الملف عبارة عن كائن للطلاب مباشرة
        Object.entries(data).forEach(([seat, info]) => { updates[`results/${grade}/${seat}`] = info; count++; });
      } else { toast('صيغة غير مدعومة','e'); return; }
      if(count===0) { toast('لا توجد بيانات','w'); return; }
      db.ref().update(updates).then(() => { toast(`تم رفع ${count} طالب بنجاح`,'s'); });
    } catch(err) { toast('خطأ في JSON','e'); }
  };
  reader.readAsText(file);
}
// بدء التطبيق

  loadStats();
  loadTicker();
  // تحميل السلايدر من مجلدات الملفات
  db.ref('gallery_section').limitToLast(5).once('value', snap => { let slides=[]; snap.forEach(c=>{if(c.val().url && /\.(jpg|png)/i.test(c.val().url)) slides.push({url:c.val().url, cap:c.val().title});}); buildSlider(slides); });
  document.getElementById('ldr').style.display = 'none';
