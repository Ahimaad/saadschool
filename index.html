<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes">
<title>مدرسة سعد بن أبي وقاص - البوابة الرقمية</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

:root {
  --primary: #0a2b4e;
  --gold: #d4af37;
  --bg: #f0f2f8;
  --white: #ffffff;
  --shadow: 0 5px 20px rgba(0,0,0,0.08);
  --radius: 16px;
}

body { background: var(--bg); }
body.dark { background: #0a0e1a; color: #e0e5f0; }
body.dark .card, body.dark .post-card, body.dark .sidebar-btn { background: #141c2c; color: #e0e5f0; }

/* Loader */
#loader { position: fixed; inset: 0; background: var(--primary); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; transition: 0.4s; }
#loader.hide { opacity: 0; visibility: hidden; pointer-events: none; }
.loader-logo { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--gold); background: white; padding: 8px; animation: pulse 1s infinite; object-fit: cover; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }

/* Header */
header { background: linear-gradient(135deg, var(--primary), #0d3a60); border-bottom: 3px solid var(--gold); padding: 12px 0; position: sticky; top: 0; z-index: 100; }
.logo { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--gold); padding: 4px; background: white; object-fit: cover; }
.school-title { font-weight: 900; color: white; }

/* Ticker - LTR */
.ticker { background: linear-gradient(90deg, var(--primary), #0d3a60); color: white; padding: 8px 0; border-bottom: 2px solid var(--gold); overflow: hidden; }
.ticker-wrapper { display: flex; align-items: center; gap: 12px; direction: ltr; }
.ticker-icon { background: var(--gold); color: var(--primary); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.ticker-content { flex: 1; overflow: hidden; white-space: nowrap; }
.ticker-scroll { display: inline-block; animation: tickerMove 35s linear infinite; }
.ticker-item { display: inline-block; margin: 0 25px; }
@keyframes tickerMove { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

/* Cards */
.card { background: var(--white); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 20px; }
.sidebar-btn { background: var(--white); border: none; border-radius: 12px; padding: 12px; margin-bottom: 8px; width: 100%; text-align: right; font-weight: 700; display: flex; align-items: center; gap: 12px; border-right: 4px solid var(--gold); cursor: pointer; transition: 0.3s; }
.sidebar-btn:hover, .sidebar-btn.active { background: var(--primary); color: var(--gold); transform: translateX(-4px); }
.badge-count { margin-right: auto; background: var(--gold); color: var(--primary); padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; }

/* Post Card */
.post-card { background: var(--white); border-radius: var(--radius); padding: 18px; margin-bottom: 18px; box-shadow: var(--shadow); }
.post-header { display: flex; gap: 12px; margin-bottom: 12px; }
.post-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), #1e4a76); display: flex; align-items: center; justify-content: center; color: var(--gold); }
.post-author { font-weight: 800; color: var(--primary); }
.post-date { font-size: 0.7rem; color: #999; }
.post-content { line-height: 1.6; margin-bottom: 12px; white-space: pre-wrap; }
.post-media { margin: 12px 0; border-radius: 12px; overflow: hidden; }
.post-media img, .post-media video { width: 100%; max-height: 350px; object-fit: cover; }
.post-actions { display: flex; gap: 15px; padding-top: 10px; border-top: 1px solid #eee; }
.post-like-btn { background: none; border: none; padding: 6px 12px; border-radius: 30px; font-weight: 600; display: flex; align-items: center; gap: 8px; color: #666; cursor: pointer; }
.post-like-btn.liked { color: #e74c3c; }

/* Result Card */
.result-card { background: linear-gradient(135deg, var(--primary), #1a4070); color: white; border-radius: var(--radius); padding: 25px; border: 2px solid var(--gold); }
.subject-item { background: rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 12px; margin: 8px 0; display: flex; justify-content: space-between; }

/* Floating Buttons */
.fab { position: fixed; bottom: 25px; left: 25px; width: 48px; height: 48px; border-radius: 50%; background: var(--gold); color: var(--primary); border: none; cursor: pointer; z-index: 500; font-size: 1.2rem; }
.fab-top { bottom: 85px; background: var(--primary); color: white; opacity: 0; pointer-events: none; }
.fab-top.show { opacity: 1; pointer-events: auto; }

/* Mobile */
.mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--primary); z-index: 200; padding: 5px 0; border-top: 2px solid var(--gold); }
.mobile-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: rgba(255,255,255,0.7); background: none; border: none; font-size: 0.55rem; font-weight: 700; padding: 5px; cursor: pointer; }
.mobile-nav-item.active { color: var(--gold); }
.menu-fab { display: none; position: fixed; top: 70px; right: 15px; width: 42px; height: 42px; background: var(--gold); border: none; border-radius: 50%; z-index: 300; cursor: pointer; }
.drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 400; opacity: 0; pointer-events: none; transition: 0.3s; }
.drawer-overlay.open { opacity: 1; pointer-events: auto; }
.drawer { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: var(--primary); z-index: 401; transition: right 0.3s; padding: 20px; overflow-y: auto; }
.drawer.open { right: 0; }
.drawer-item { display: flex; align-items: center; gap: 12px; color: white; background: none; border: none; padding: 12px; width: 100%; text-align: right; font-weight: 700; border-radius: 12px; margin-bottom: 5px; cursor: pointer; }

.admin-badge { background: linear-gradient(90deg, #dc3545, #c0392b); color: white; padding: 5px 12px; border-radius: 10px; font-size: 0.7rem; display: inline-flex; align-items: center; gap: 5px; animation: pulseRed 2s infinite; }
@keyframes pulseRed { 0%,100% { box-shadow: 0 0 0 0 rgba(220,53,69,0.4); } 50% { box-shadow: 0 0 0 8px rgba(220,53,69,0); } }

@media (max-width: 768px) {
  .mobile-nav { display: flex; }
  .menu-fab { display: flex; }
  .hide-mobile { display: none !important; }
  body { padding-bottom: 65px; }
  .fab { width: 40px; height: 40px; bottom: 75px; }
  .fab-top { bottom: 125px; }
}
</style>
</head>
<body>

<div id="loader"><img src="logo.jpg" class="loader-logo" onerror="this.src='https://placehold.co/80x80'"><p style="color:white">جاري التحميل...</p></div>

<button class="fab" id="themeBtn" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
<button class="fab fab-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})"><i class="fas fa-chevron-up"></i></button>

<header>
  <div class="container">
    <div class="row align-items-center">
      <div class="col-md-auto"><img src="logo.jpg" class="logo" onerror="this.src='https://placehold.co/60x60'"></div>
      <div class="col">
        <div style="background:var(--gold);color:var(--primary);display:inline-block;padding:2px 12px;border-radius:20px;font-size:0.7rem">إدارة الفشن التعليمية</div>
        <h1 class="school-title fs-4 mb-0">مدرسة سعد بن أبي وقاص الرسمية للغات</h1>
      </div>
    </div>
  </div>
</header>

<div class="ticker"><div class="container"><div class="ticker-wrapper"><div class="ticker-icon"><i class="fas fa-bullhorn"></i></div><div class="ticker-content"><div class="ticker-scroll" id="tickerScroll"></div></div></div></div></div>

<div class="container my-4">
  <div class="row g-4">
    <div class="col-lg-4 hide-mobile">
      <div class="card">
        <button class="sidebar-btn" onclick="loadPage('home')"><i class="fas fa-home"></i><span>الرئيسية</span></button>
        <button class="sidebar-btn" onclick="loadPage('posts')"><i class="fas fa-newspaper"></i><span>المنشورات</span><span class="badge-count" id="postsCount">0</span></button>
        <button class="sidebar-btn" onclick="loadPage('results')"><i class="fas fa-user-graduate"></i><span>النتائج</span></button>
        <button class="sidebar-btn" onclick="loadPage('gallery')"><i class="fas fa-images"></i><span>المعرض</span></button>
        <button class="sidebar-btn" onclick="loadPage('library')"><i class="fas fa-book"></i><span>المكتبة</span></button>
        <button class="sidebar-btn" onclick="toggleAdmin()" style="border-right-color:#dc3545"><i class="fas fa-lock"></i><span id="adminBtn">لوحة الإدارة</span></button>
      </div>
      <div class="card">
        <h6><i class="fas fa-chart-line me-2"></i> إحصائيات المدرسة</h6>
        <div class="d-flex justify-content-between p-2 bg-light rounded-3 mb-2"><span>الطلاب</span><span id="statStudents">0</span></div>
        <div class="d-flex justify-content-between p-2 bg-light rounded-3 mb-2"><span>المعلمون</span><span id="statTeachers">0</span></div>
        <div class="d-flex justify-content-between p-2 bg-light rounded-3"><span>الأنشطة</span><span id="statActivities">0</span></div>
        <div id="adminStatus" class="mt-2"></div>
      </div>
    </div>
    <div class="col-lg-8">
      <div id="mainContent" class="card"></div>
    </div>
  </div>
</div>

<button class="menu-fab" onclick="openDrawer()"><i class="fas fa-bars"></i></button>
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawerMenu">
  <div class="d-flex gap-2 mb-4"><img src="logo.jpg" style="width:45px;border-radius:50%"><span class="text-white fw-bold">القائمة</span></div>
  <button class="drawer-item" onclick="loadPage('home');closeDrawer()"><i class="fas fa-home"></i> الرئيسية</button>
  <button class="drawer-item" onclick="loadPage('posts');closeDrawer()"><i class="fas fa-newspaper"></i> المنشورات</button>
  <button class="drawer-item" onclick="loadPage('results');closeDrawer()"><i class="fas fa-graduation-cap"></i> النتائج</button>
  <button class="drawer-item" onclick="loadPage('gallery');closeDrawer()"><i class="fas fa-images"></i> المعرض</button>
  <button class="drawer-item" onclick="loadPage('library');closeDrawer()"><i class="fas fa-book"></i> المكتبة</button>
  <button class="drawer-item" onclick="toggleAdmin();closeDrawer()"><i class="fas fa-lock"></i> <span id="drawerAdminText">الإدارة</span></button>
</div>

<nav class="mobile-nav">
  <button class="mobile-nav-item" onclick="loadPage('home')"><i class="fas fa-home"></i>الرئيسية</button>
  <button class="mobile-nav-item" onclick="loadPage('posts')"><i class="fas fa-newspaper"></i>منشورات</button>
  <button class="mobile-nav-item" onclick="loadPage('results')"><i class="fas fa-search"></i>نتائج</button>
  <button class="mobile-nav-item" onclick="loadPage('gallery')"><i class="fas fa-images"></i>معرض</button>
  <button class="mobile-nav-item" onclick="openDrawer()"><i class="fas fa-bars"></i>القائمة</button>
</nav>

<footer class="py-3 mt-4 bg-dark text-white text-center small"><div class="container">© 2026 مدرسة سعد بن أبي وقاص</div></footer>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
// ============================================================
// FIREBASE - استخدام القواعد التي أرسلتها
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyC79JwFiDucsph3T8PTKntbk_VE1ANFTxg",
  authDomain: "saad-school-portal.firebaseapp.com",
  databaseURL: "https://saad-school-portal-default-rtdb.firebaseio.com",
  projectId: "saad-school-portal",
  storageBucket: "saad-school-portal.firebasestorage.app",
  messagingSenderId: "1085838136773",
  appId: "1:1085838136773:web:0d200edd01bd12fb0a27ac"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ============================================================
// المتغيرات العامة
// ============================================================
let currentUser = false; // false = زائر, true = مدير
let isAdmin = false;
let currentPage = "home";

// الإحصائيات
let stats = { students: 1250, teachers: 85, activities: 24 };

// ============================================================
// دوال مساعدة
// ============================================================
function showToast(msg, type = "success") {
  Swal.fire({ toast: true, position: "top-left", icon: type, title: msg, showConfirmButton: false, timer: 3000 });
}

function escapeHtml(text) {
  if (!text) return "";
  const div = document.createElement("div");
  div.appendChild(document.createTextNode(text));
  return div.innerHTML;
}

// ============================================================
// تحميل الإحصائيات من Firebase
// ============================================================
async function loadStats() {
  try {
    const snap = await db.ref("school_stats").once("value");
    if (snap.exists()) stats = snap.val();
    else await db.ref("school_stats").set(stats);
  } catch(e) {}
  document.getElementById("statStudents").innerText = stats.students;
  document.getElementById("statTeachers").innerText = stats.teachers;
  document.getElementById("statActivities").innerText = stats.activities;
}

// تعديل الإحصائيات
async function editStat(statName) {
  if (!isAdmin) { showToast("متاح للإدارة فقط", "warning"); return; }
  const labels = { students: "الطلاب", teachers: "المعلمين", activities: "الأنشطة" };
  const { value } = await Swal.fire({ title: `تعديل عدد ${labels[statName]}`, input: "number", inputValue: stats[statName], showCancelButton: true });
  if (value && parseInt(value) !== stats[statName]) {
    stats[statName] = parseInt(value);
    await db.ref("school_stats").set(stats);
    document.getElementById(`stat${statName.charAt(0).toUpperCase() + statName.slice(1)}`).innerText = stats[statName];
    showToast(`تم تحديث ${labels[statName]}`, "success");
    if (currentPage === "home") showHome();
  }
}

// ============================================================
// شريط الأخبار
// ============================================================
async function loadTicker() {
  try {
    const snap = await db.ref("ticker_items").once("value");
    let items = [];
    if (snap.exists()) snap.forEach(c => items.push(c.val().text));
    if (items.length === 0) items = ["مرحباً بكم في بوابة المدرسة", "نظام متكامل للنتائج والمكتبة"];
    const container = document.getElementById("tickerScroll");
    if (container) container.innerHTML = items.map(t => `<span class="ticker-item"><i class="fas fa-star"></i> ${escapeHtml(t)}</span>`).join("") + items.map(t => `<span class="ticker-item"><i class="fas fa-star"></i> ${escapeHtml(t)}</span>`).join("");
  } catch(e) {}
}

// ============================================================
// الصفحة الرئيسية
// ============================================================
function showHome() {
  document.getElementById("mainContent").innerHTML = `
    <div class="text-center">
      <div style="width:80px;height:80px;background:linear-gradient(135deg,var(--primary),#1e4a76);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px"><i class="fas fa-school fa-2x text-white"></i></div>
      <h2>مرحباً في بوابة مدرسة سعد بن أبي وقاص</h2>
      <p class="text-muted">نظام متكامل للنتائج والمكتبة الرقمية</p>
      <div class="row g-3 mt-3">
        <div class="col-4"><div class="p-3 bg-light rounded-3"><div class="h2 text-primary">${stats.students}</div><small>طالب</small></div></div>
        <div class="col-4"><div class="p-3 bg-light rounded-3"><div class="h2 text-success">${stats.teachers}</div><small>معلم</small></div></div>
        <div class="col-4"><div class="p-3 bg-light rounded-3"><div class="h2 text-warning">${stats.activities}</div><small>نشاط</small></div></div>
      </div>
    </div>
  `;
}

// ============================================================
// قسم النتائج
// ============================================================
const GRADES = {
  p3: "الصف الثالث الابتدائي", p4: "الصف الرابع الابتدائي", p5: "الصف الخامس الابتدائي",
  p6: "الصف السادس الابتدائي", m1: "الصف الأول الإعدادي", m2: "الصف الثاني الإعدادي",
  m3: "الصف الثالث الإعدادي"
};

function showResults() {
  document.getElementById("mainContent").innerHTML = `
    <div class="bg-light p-3 rounded-4 mb-3">
      <div class="row g-2">
        <div class="col-6"><select id="gradeSelect" class="form-select">${Object.entries(GRADES).map(([v,n]) => `<option value="${v}">${n}</option>`).join("")}</select></div>
        <div class="col-6"><input type="text" id="seatInput" class="form-control" placeholder="رقم الجلوس"></div>
      </div>
    </div>
    <button class="btn btn-primary w-100 mb-3" onclick="searchResult()"><i class="fas fa-search"></i> استعلام</button>
    <div id="resultDisplay"></div>
  `;
}

async function searchResult() {
  const grade = document.getElementById("gradeSelect").value;
  const seat = document.getElementById("seatInput").value.trim();
  const display = document.getElementById("resultDisplay");
  
  if (!seat) { showToast("أدخل رقم الجلوس", "warning"); return; }
  display.innerHTML = '<div class="text-center p-5"><div class="spinner-border"></div></div>';
  
  try {
    const snap = await db.ref(`results/${grade}/${seat}`).once("value");
    if (!snap.exists()) { display.innerHTML = `<div class="alert alert-danger">رقم الجلوس ${seat} غير مسجل</div>`; return; }
    const d = snap.val();
    let subs = "";
    if (d.subjects) Object.entries(d.subjects).forEach(([s,sc]) => subs += `<div class="subject-item"><span>${s}</span><span>${sc}</span></div>`);
    display.innerHTML = `<div class="result-card"><div class="text-center"><i class="fas fa-graduation-cap fa-3x"></i><h3>${escapeHtml(d.name)}</h3><span class="badge bg-warning text-dark">${GRADES[grade]}</span><div>رقم الجلوس: ${seat}</div></div>${subs}<div class="row g-2 mt-3"><div class="col-4"><div class="stat-box">المجموع<br><strong>${d.total || "-"}</strong></div></div><div class="col-4"><div class="stat-box">النسبة<br><strong>${d.percentage || "-"}%</strong></div></div><div class="col-4"><div class="stat-box">التقدير<br><strong>${d.grade || "-"}</strong></div></div></div></div>`;
  } catch(e) { display.innerHTML = '<div class="alert alert-danger">خطأ</div>'; }
}

// ============================================================
// المنشورات
// ============================================================
async function loadPosts() {
  const container = document.getElementById("postsList");
  if (!container) return;
  container.innerHTML = '<div class="text-center p-5"><div class="spinner-border"></div></div>';
  
  try {
    const snap = await db.ref("posts").once("value");
    let posts = [];
    if (snap.exists()) snap.forEach(c => posts.push({ id: c.key, ...c.val() }));
    posts.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
    document.getElementById("postsCount").innerText = posts.length;
    
    if (posts.length === 0) {
      container.innerHTML = `<div class="text-center p-5">لا توجد منشورات${isAdmin ? '<br><button class="btn btn-primary mt-2" onclick="openPostModal()">أضف أول منشور</button>' : ""}</div>`;
      return;
    }
    container.innerHTML = posts.map(p => renderPost(p)).join("");
  } catch(e) { container.innerHTML = '<div class="alert alert-danger">خطأ في التحميل</div>'; }
}

function renderPost(p) {
  const vid = localStorage.getItem("visitorId") || "guest";
  const liked = p.likes && p.likes[vid];
  const likeCount = p.likes ? Object.keys(p.likes).length : 0;
  const commentCount = p.comments ? Object.keys(p.comments).length : 0;
  
  let mediaHtml = "";
  if (p.mediaUrl) {
    if (p.mediaUrl.includes("youtube.com") || p.mediaUrl.includes("youtu.be")) {
      const videoId = p.mediaUrl.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?#]+)/)?.[1];
      if (videoId) mediaHtml = `<div style="position:relative;padding-bottom:56.25%"><iframe src="https://www.youtube.com/embed/${videoId}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;border-radius:12px"></iframe></div>`;
      else mediaHtml = `<img src="${p.mediaUrl}" style="max-width:100%;border-radius:12px">`;
    } else if (p.mediaUrl.match(/\.(jpg|jpeg|png|gif|webp)(\?|$)/i)) {
      mediaHtml = `<img src="${p.mediaUrl}" style="max-width:100%;border-radius:12px">`;
    } else if (p.mediaUrl.match(/\.(mp4|mov|avi)(\?|$)/i)) {
      mediaHtml = `<video controls src="${p.mediaUrl}" style="max-width:100%;border-radius:12px"></video>`;
    } else {
      mediaHtml = `<a href="${p.mediaUrl}" target="_blank" class="btn btn-outline-primary btn-sm">فتح الرابط</a>`;
    }
    mediaHtml = `<div class="post-media">${mediaHtml}</div>`;
  }
  
  let commentsHtml = "";
  if (p.comments) {
    commentsHtml = Object.values(p.comments).map(c => `<div class="bg-light p-2 rounded-3 mb-2"><b>${escapeHtml(c.name)}</b><div>${escapeHtml(c.text)}</div><small>${c.date || ""}</small></div>`).join("");
  }
  
  return `
    <div class="post-card">
      <div class="post-header"><div class="post-avatar"><i class="fas fa-school"></i></div><div><div class="post-author">${escapeHtml(p.author || "إدارة المدرسة")}</div><div class="post-date">${p.date || ""}</div></div></div>
      <div class="post-content">${escapeHtml(p.content)}</div>
      ${mediaHtml}
      <div class="post-actions">
        <button class="post-like-btn ${liked ? "liked" : ""}" onclick="likePost('${p.id}')"><i class="fas fa-thumbs-up"></i> ${likeCount}</button>
        <button class="post-like-btn" onclick="toggleComments('${p.id}')"><i class="fas fa-comment"></i> ${commentCount}</button>
        ${isAdmin ? `<button class="post-like-btn text-danger" onclick="deletePost('${p.id}')"><i class="fas fa-trash"></i> حذف</button>` : ""}
      </div>
      <div id="comments-${p.id}" style="display:none" class="mt-3 pt-2 border-top">
        ${commentsHtml}
        <div class="input-group mt-2"><input type="text" id="commentInput-${p.id}" class="form-control form-control-sm" placeholder="اكتب تعليق..."><button class="btn btn-sm btn-primary" onclick="addComment('${p.id}')"><i class="fas fa-paper-plane"></i></button></div>
      </div>
    </div>
  `;
}

function toggleComments(id) {
  const el = document.getElementById(`comments-${id}`);
  if (el) el.style.display = el.style.display === "none" ? "block" : "none";
}

async function likePost(id) {
  let vid = localStorage.getItem("visitorId");
  if (!vid) { vid = "user_" + Date.now(); localStorage.setItem("visitorId", vid); }
  const likeRef = db.ref(`posts/${id}/likes/${vid}`);
  const snap = await likeRef.once("value");
  if (snap.exists()) await likeRef.remove();
  else await likeRef.set(true);
  loadPosts();
}

async function addComment(id) {
  const input = document.getElementById(`commentInput-${id}`);
  const text = input?.value?.trim();
  if (!text) return;
  await db.ref(`posts/${id}/comments`).push({ name: isAdmin ? "الإدارة" : "زائر", text: text, date: new Date().toLocaleString() });
  input.value = "";
  loadPosts();
  showToast("تم إضافة التعليق", "success");
}

async function deletePost(id) {
  const res = await Swal.fire({ title: "حذف المنشور؟", icon: "warning", showCancelButton: true });
  if (res.isConfirmed) { await db.ref(`posts/${id}`).remove(); loadPosts(); showToast("تم الحذف", "success"); }
}

function openPostModal() {
  Swal.fire({
    title: "منشور جديد",
    html: `<textarea id="postContent" class="swal2-textarea" placeholder="محتوى المنشور..." rows="4"></textarea><input type="url" id="postMedia" class="form-control mt-2" placeholder="رابط (YouTube, صورة, فيديو)">`,
    showCancelButton: true,
    confirmButtonText: "نشر",
    preConfirm: () => ({ content: document.getElementById("postContent").value.trim(), mediaUrl: document.getElementById("postMedia").value.trim() })
  }).then(async res => {
    if (res.isConfirmed && res.value.content) {
      await db.ref("posts").push({
        content: res.value.content,
        mediaUrl: res.value.mediaUrl || null,
        author: isAdmin ? "إدارة المدرسة" : "معلم",
        timestamp: Date.now(),
        date: new Date().toLocaleDateString(),
        time: new Date().toLocaleTimeString(),
        likes: {},
        comments: {}
      });
      showToast("تم النشر", "success");
      loadPosts();
    } else if (!res.value.content) showToast("أدخل محتوى", "warning");
  });
}

function showPostsPage() {
  document.getElementById("mainContent").innerHTML = `
    ${isAdmin ? `<div class="bg-white p-3 rounded-3 text-center mb-3" style="cursor:pointer" onclick="openPostModal()"><i class="fas fa-plus-circle"></i> أنشئ منشوراً جديداً</div>` : ""}
    <div id="postsList"></div>
  `;
  loadPosts();
}

// ============================================================
// إدارة الملفات (معرض، مكتبة)
// ============================================================
let currentFilesList = [];

async function showFiles(section, title) {
  document.getElementById("mainContent").innerHTML = `<h4>${title}</h4><div id="filesGrid" class="row g-3"><div class="col-12 text-center p-5"><div class="spinner-border"></div></div></div>`;
  try {
    const snap = await db.ref(section).once("value");
    let files = [];
    if (snap.exists()) snap.forEach(c => files.push({ id: c.key, ...c.val() }));
    files.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
    if (files.length === 0) { document.getElementById("filesGrid").innerHTML = '<div class="col-12 text-center p-5">لا توجد ملفات</div>'; return; }
    document.getElementById("filesGrid").innerHTML = files.map(f => `
      <div class="col-md-6">
        <div class="border rounded-3 overflow-hidden bg-white">
          <div style="height:160px;background:#f0f2f5;display:flex;align-items:center;justify-content:center">
            ${f.url.match(/\.(jpg|jpeg|png|gif|webp)(\?|$)/i) ? `<img src="${f.url}" style="width:100%;height:100%;object-fit:cover">` : '<i class="fas fa-file-pdf fa-3x text-danger"></i>'}
          </div>
          <div class="p-3"><div class="fw-bold">${escapeHtml(f.title || "بدون عنوان")}</div><div class="small text-muted">${f.uploadedAt || ""}</div><div class="mt-2"><a href="${f.url}" target="_blank" class="btn btn-sm btn-primary">عرض</a></div></div>
        </div>
      </div>
    `).join("");
  } catch(e) {}
}

// ============================================================
// إدارة الأخبار
// ============================================================
async function showNews() {
  document.getElementById("mainContent").innerHTML = `<div id="newsList"><div class="text-center p-5"><div class="spinner-border"></div></div></div>`;
  try {
    const snap = await db.ref("school_news").orderByChild("timestamp").once("value");
    let news = [];
    if (snap.exists()) snap.forEach(c => news.push({ id: c.key, ...c.val() }));
    news.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
    if (news.length === 0) { document.getElementById("newsList").innerHTML = '<div class="text-center p-5">لا توجد أخبار</div>'; return; }
    document.getElementById("newsList").innerHTML = news.map(n => `
      <div class="bg-white p-3 rounded-3 mb-2 border-right-3" style="border-right:3px solid var(--gold)">
        <div class="fw-bold">${escapeHtml(n.title)}</div>
        <div class="small text-muted">${n.dateStr || ""}</div>
        <p class="mt-2">${escapeHtml(n.body)}</p>
      </div>
    `).join("");
  } catch(e) {}
}

// ============================================================
// لوحة الإدارة
// ============================================================
function showAdminPanel() {
  document.getElementById("mainContent").innerHTML = `
    <h4 class="mb-3">لوحة تحكم الإدارة</h4>
    <div class="row g-3">
      <div class="col-6"><div class="bg-white p-3 text-center border rounded-3" style="cursor:pointer" onclick="openPostModal()"><i class="fas fa-pen-fancy fa-2x mb-2"></i><h6>منشور جديد</h6></div></div>
      <div class="col-6"><div class="bg-white p-3 text-center border rounded-3" style="cursor:pointer" onclick="editStat('students')"><i class="fas fa-chart-bar fa-2x mb-2"></i><h6>تعديل الإحصائيات</h6></div></div>
    </div>
  `;
}

// ============================================================
// تسجيل الدخول كمدير
// ============================================================
async function toggleAdmin() {
  if (isAdmin) {
    isAdmin = false;
    document.getElementById("adminBtn").innerText = "لوحة الإدارة";
    document.getElementById("drawerAdminText").innerText = "الإدارة";
    document.getElementById("adminStatus").innerHTML = "";
    showToast("تم تسجيل الخروج", "info");
    loadPage(currentPage);
    return;
  }
  const { value } = await Swal.fire({ title: "دخول الإدارة", input: "password", inputLabel: "كلمة السر", showCancelButton: true });
  if (value && btoa(value) === "YWRtaW4xMjM=") {
    isAdmin = true;
    document.getElementById("adminBtn").innerText = "تسجيل خروج";
    document.getElementById("drawerAdminText").innerText = "تسجيل خروج";
    document.getElementById("adminStatus").innerHTML = '<div class="admin-badge mt-2"><i class="fas fa-shield-alt"></i> وضع الإدارة مفعل</div>';
    showToast("تم تفعيل الإدارة", "success");
    showAdminPanel();
    currentPage = "admin";
  } else if (value) showToast("كلمة سر خاطئة", "error");
}

// ============================================================
// التنقل بين الصفحات
// ============================================================
function loadPage(page) {
  currentPage = page;
  document.querySelectorAll(".sidebar-btn, .mobile-nav-item, .drawer-item").forEach(btn => btn.classList.remove("active"));
  if (page === "home") { showHome(); currentPage = "home"; }
  else if (page === "posts") { showPostsPage(); currentPage = "posts"; }
  else if (page === "results") { showResults(); currentPage = "results"; }
  else if (page === "gallery") { showFiles("gallery_section", "📸 المعرض"); currentPage = "gallery"; }
  else if (page === "library") { showFiles("library_section", "📚 المكتبة"); currentPage = "library"; }
  else if (page === "news") { showNews(); currentPage = "news"; }
  window.scrollTo({ top: 0 });
}

// ============================================================
// الوضع المظلم والقائمة الجانبية
// ============================================================
function toggleTheme() {
  document.body.classList.toggle("dark");
  localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
  const icon = document.querySelector("#themeBtn i");
  if (icon) icon.className = document.body.classList.contains("dark") ? "fas fa-sun" : "fas fa-moon";
}

function openDrawer() {
  document.getElementById("drawerMenu").classList.add("open");
  document.getElementById("drawerOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeDrawer() {
  document.getElementById("drawerMenu").classList.remove("open");
  document.getElementById("drawerOverlay").classList.remove("open");
  document.body.style.overflow = "";
}

// ============================================================
// بدء التطبيق
// ============================================================
window.addEventListener("load", async () => {
  if (localStorage.getItem("theme") === "dark") toggleTheme();
  await loadStats();
  await loadTicker();
  setTimeout(() => document.getElementById("loader")?.classList.add("hide"), 800);
  showHome();
  window.addEventListener("scroll", () => document.getElementById("scrollTop")?.classList.toggle("show", window.scrollY > 200));
});
</script>
