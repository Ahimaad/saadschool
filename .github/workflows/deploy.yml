name: 🏫 Deploy School Portal

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # ✅ حل تحذير Node.js 20 — التشغيل مع Node.js 24
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Inject Secrets
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          ADMIN_SECRET_KEY: ${{ secrets.ADMIN_SECRET_KEY }}
          CLD_CLOUD: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
        run: |
          sed -i "s|%%FIREBASE_API_KEY%%|${FIREBASE_API_KEY}|g" index.html
          sed -i "s|%%FIREBASE_AUTH_DOMAIN%%|${FIREBASE_AUTH_DOMAIN}|g" index.html
          sed -i "s|%%FIREBASE_DATABASE_URL%%|${FIREBASE_DATABASE_URL}|g" index.html
          sed -i "s|%%FIREBASE_PROJECT_ID%%|${FIREBASE_PROJECT_ID}|g" index.html
          sed -i "s|%%FIREBASE_STORAGE_BUCKET%%|${FIREBASE_STORAGE_BUCKET}|g" index.html
          sed -i "s|%%FIREBASE_MESSAGING_SENDER_ID%%|${FIREBASE_MESSAGING_SENDER_ID}|g" index.html
          sed -i "s|%%FIREBASE_APP_ID%%|${FIREBASE_APP_ID}|g" index.html
          sed -i "s|const SECRET_KEY=\"[^\"]*\";|const SECRET_KEY=\"${ADMIN_SECRET_KEY}\";|g" index.html
          if [ -n "${CLD_CLOUD}" ] && [ -n "${CLD_PRESET}" ]; then
            sed -i "s|const CLD_CLOUD = '[^']*'|const CLD_CLOUD = '${CLD_CLOUD}'|g" index.html
            sed -i "s|const CLD_PRESET = '[^']*'|const CLD_PRESET = '${CLD_PRESET}'|g" index.html
          fi

      - name: 📅 Add Date
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          sed -i "s|جميع الحقوق محفوظة|جميع الحقوق محفوظة — آخر تحديث: ${DATE}|g" index.html || true

      - name: 📦 Prepare
        run: |
          mkdir -p _site
          cp index.html _site/
          cp logo.jpg _site/ 2>/dev/null || true
          cp -r images _site/ 2>/dev/null || true

      - name: 📤 Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: 🌐 Deploy
        id: deployment
        uses: actions/deploy-pages@v4
