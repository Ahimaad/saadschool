# ============================================================
#  🚀 GitHub Actions — نشر تلقائي مع حماية Firebase Secrets
#  المدرسة: سعد بن أبي وقاص الرسمية للغات
#  ☁️ مع دعم Cloudinary
# ============================================================

name: 🏫 Deploy School Portal

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # ============================================================
  #  JOB 1: فحص الكود (مُحدَّث)
  # ============================================================
  validate:
    name: ✅ فحص الملفات
    runs-on: ubuntu-latest
    steps:
      - name: 📥 تحميل الكود
        uses: actions/checkout@v4

      - name: 🔍 التحقق من وجود index.html
        run: |
          if [ ! -f "index.html" ]; then
            echo "❌ خطأ: ملف index.html غير موجود!"
            exit 1
          fi
          echo "✅ index.html موجود"

      # ✅ تم تعديل الفحص: نسمح بمفاتيح Firebase العامة، ونمنع فقط الأسرار الحقيقية
      - name: 🔒 فحص أمني ذكي (يسمح بـ Firebase Public Keys)
        run: |
          echo "🔍 جاري الفحص الأمني..."
          
          # ❌ نمنع وجود كلمات سر حقيقية (ليس مفاتيح API عامة)
          if grep -qE "(firebaseConfig\s*=\s*\{[^}]*apiKey\s*:\s*['\"][^'\"]+['\"])|(\"[A-Za-z0-9+/]{40,}\")|(sk_live_|pk_live_)" index.html; then
            echo "❌ خطأ: تم العثور على بيانات حساسة غير مسموح بها في index.html"
            exit 1
          fi
          
          # ✅ نسمح بـ:
          # - Firebase API Key (AIzaSy...) ← عام وضروري
          # - Cloudinary Cloud Name (dyo4ff7ha) ← عام وضروري
          # - أي متغير يتم حقنه لاحقاً عبر ${{ secrets.* }}
          
          echo "✅ الفحص الأمني: ناجح (لا توجد أسرار حقيقية مكشوفة)"

  # ============================================================
  #  JOB 2: بناء ونشر الموقع
  # ============================================================
  deploy:
    name: 🚀 بناء ونشر الموقع
    needs: validate
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 تحميل الكود من GitHub
        uses: actions/checkout@v4

      # ── 2. حقن Firebase Secrets ───────────────────────────────
      - name: 🔐 حقن بيانات Firebase الآمنة
        env:
          FIREBASE_API_KEY:             ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:         ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_DATABASE_URL:        ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_PROJECT_ID:          ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:      ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:              ${{ secrets.FIREBASE_APP_ID }}
          ADMIN_SECRET_KEY:             ${{ secrets.ADMIN_SECRET_KEY }}
        run: |
          echo "🔄 جاري حقن متغيرات Firebase..."
          sed -i "s|%%FIREBASE_API_KEY%%|${FIREBASE_API_KEY}|g"                         index.html
          sed -i "s|%%FIREBASE_AUTH_DOMAIN%%|${FIREBASE_AUTH_DOMAIN}|g"                 index.html
          sed -i "s|%%FIREBASE_DATABASE_URL%%|${FIREBASE_DATABASE_URL}|g"               index.html
          sed -i "s|%%FIREBASE_PROJECT_ID%%|${FIREBASE_PROJECT_ID}|g"                   index.html
          sed -i "s|%%FIREBASE_STORAGE_BUCKET%%|${FIREBASE_STORAGE_BUCKET}|g"           index.html
          sed -i "s|%%FIREBASE_MESSAGING_SENDER_ID%%|${FIREBASE_MESSAGING_SENDER_ID}|g" index.html
          sed -i "s|%%FIREBASE_APP_ID%%|${FIREBASE_APP_ID}|g"                           index.html
          sed -i "s|const SECRET_KEY=\"[^\"]*\";|const SECRET_KEY=\"${ADMIN_SECRET_KEY}\";|g" index.html
          echo "✅ تم حقن جميع متغيرات Firebase"

      # ── 3. حقن Cloudinary Secrets ─────────────────────────────
      - name: ☁️ حقن بيانات Cloudinary الآمنة
        env:
          CLD_CLOUD:  ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
        run: |
          if [ -n "${CLD_CLOUD}" ] && [ -n "${CLD_PRESET}" ]; then
            echo "🔄 جاري حقن متغيرات Cloudinary..."
            sed -i "s|const CLD_CLOUD = '[^']*'|const CLD_CLOUD = '${CLD_CLOUD}'|g" index.html
            sed -i "s|const CLD_PRESET = '[^']*'|const CLD_PRESET = '${CLD_PRESET}'|g" index.html
            echo "✅ تم حقن Cloudinary Cloud Name و Upload Preset"
          else
            echo "⚠️  Cloudinary Secrets غير موجودة — سيتم استخدام القيم الافتراضية من الكود"
          fi

      # ── 4. إضافة تاريخ آخر نشر ─────────────────────────────
      - name: 📅 إضافة تاريخ آخر تحديث
        run: |
          BUILD_DATE=$(TZ='Africa/Cairo' date '+%Y-%m-%d %H:%M')
          sed -i "s|جميع الحقوق محفوظة|جميع الحقوق محفوظة — آخر تحديث: ${BUILD_DATE}|g" index.html
          echo "✅ تم إضافة تاريخ البناء: ${BUILD_DATE}"

      # ── 5. تحسين الأداء ─────────────────────────────────────
      - name: ⚡ ضغط الملفات لتحسين السرعة
        run: |
          mkdir -p _site
          cp index.html _site/
          [ -f logo.jpg ]    && cp logo.jpg _site/    || echo "logo.jpg غير موجود"
          [ -d images ]      && cp -r images _site/   || true
          [ -f favicon.ico ] && cp favicon.ico _site/ || true
          echo "📊 حجم index.html: $(du -sh _site/index.html | cut -f1)"
          echo "✅ الملفات جاهزة للنشر"

      # ── 6. رفع الملفات لـ GitHub Pages ─────────────────────
      - name: 📤 رفع الملفات لـ GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      # ── 7. نشر على GitHub Pages ─────────────────────────────
      - name: 🌐 نشر على GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ── 8. رسالة نجاح ───────────────────────────────────────
      - name: 🎉 تم النشر بنجاح!
        run: |
          echo "══════════════════════════════════════"
          echo "  ✅ تم نشر الموقع بنجاح!"
          echo "  🌐 الرابط: ${{ steps.deployment.outputs.page_url }}"
          echo "  📅 وقت النشر: $(TZ='Africa/Cairo' date '+%Y-%m-%d %H:%M')"
          echo "══════════════════════════════════════"

  # ============================================================
  #  JOB 3: إشعار بالنتيجة
  # ============================================================
  notify:
    name: 📬 إشعار النتيجة
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: ✅ نجح النشر
        if: needs.deploy.result == 'success'
        run: echo "🎉 تم نشر موقع مدرسة سعد بن أبي وقاص بنجاح مع دعم Cloudinary!"

      - name: ❌ فشل النشر
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ فشل نشر الموقع!"
          echo "راجع الـ logs أعلاه لمعرفة السبب"
          exit 1
